function saySheetSend(){
 var d=state._saySheet;if(!d)return;
 var note=(d.note||'').trim();
 // Ziel-Profil-ID ermitteln (person oder projekt-owner)
 var targetPid, targetName;
 if(d.proj){ var pr=proj(d.id)||{}; targetPid=pr._owner; targetName=pr.n; }
 else { var pe=person(d.id)||{}; targetPid=pe._dbid; targetName=pe.n; }
 // Optimistisch: sofort als "sent" markieren + sheet schliessen
 state._sentHi=state._sentHi||{};
 state._sentHi[(d.proj?'r':'p')+d.id]=true;
 var kind=d.proj?'proj':'person'; var sid=d.id;
 state._saySheet=null;
 var mk=document.getElementById('mask');if(mk)mk.classList.remove('on');
 document.body.classList.remove('noscroll');
 // Echter Backend-Call: sendet pending request, zieht 10 coins ab (B muss annehmen)
 if(sb&&targetPid){
   sb.rpc('send_request',{target:targetPid, note:note, kind:(d.proj?'project':'person'), ref:sid}).then(function(r){
     var res=r.data||{};
     if(res.error==='not_enough_coins'){ state._sentHi[(d.proj?'r':'p')+sid]=false; openWallet(); toast('Not enough coins \u00b7 claim your daily first'); return; }
     if(res.error==='no_profile'){ state._sentHi[(d.proj?'r':'p')+sid]=false; openOnboarding(); return; }
     if(res.error==='already_sent'){ toast('Already sent \u2014 waiting for them'); return; }
     if(res.error){ state._sentHi[(d.proj?'r':'p')+sid]=false; toast('Could not send'); render(); return; }
     if(typeof res.balance==='number') state.coins=res.balance;
     toast('Request sent \u00b7 \u221210 coins \u2014 you\u2019ll hear back in your inbox');
     render();
   }).catch(function(){ state._sentHi[(d.proj?'r':'p')+sid]=false; toast('Could not send'); render(); });
 } else {
   // Preview/offline: lokal simulieren (kostet coins, landet bei "B" nur als bestaetigung)
   if((state.coins||0)>=10){ state.coins=(state.coins||0)-10; }

   render();
 }
}

 v=g('coff');if(v!==undefined)d.off=v;v=g('ccommit');if(v!==undefined)d.commit=v;v=g('cwhere');if(v!==undefined)d.where=v;}
function livePrev(){const d=state.draft;const g=id=>document.getElementById(id);
 const nm=(g('cn')?g('cn').value:'').trim();const wt=(g('cwhat')?g('cwhat').value:'').trim();
 if(g('cp-n'))g('cp-n').textContent=nm||'Your project';
 if(g('cp-i'))g('cp-i').textContent=(nm.charAt(0)||'?').toUpperCase();
 const meta=g('cp-meta');
 if(meta){var parts=[d.stage]; if(d.ind)parts.push(d.ind); if((d.roles||[]).length)parts.push('needs '+d.roles.join(', ')); parts.push(d.off||'Equity'); meta.textContent=parts.join(' \u00b7 ');}
}

function vLiked(){

 const ids=[...state.saved];
 const items=ids.map(function(id){
   var p=(state._dbP||[]).find(function(x){return x.id===id;})||((typeof P!=='undefined')?P.find(function(x){return x.id===id;}):null);
   if(p)return {t:'p',x:p,id:id};
   var sq=(state._dbSq||[]).find(function(x){return x.id===id;});
   if(sq)return {t:'s',x:sq,id:id};
   var pr=(state._dbPR||[]).find(function(x){return x.id===id;})||((typeof PR!=='undefined')?PR.find(function(x){return x.id===id;}):null);
   if(pr)return {t:'r',x:pr,id:id};
   return null;
 }).filter(Boolean);
 const cnt={all:items.length,p:items.filter(x=>x.t==='p').length,r:items.filter(x=>x.t!=='p').length};
 const tab=state._savTab;
 const shown=items.filter(x=>tab==='all'||(tab==='p'?x.t==='p':x.t!=='p'));
 const tabs=`<div class="savtabs">${[['all','All · '+cnt.all],['p','People · '+cnt.p],['r','Projects · '+cnt.r]].map(t=>`<span class="savtab ${tab===t[0]?'on':''}" onclick="state._savTab='${t[0]}';render()">${t[1]}</span>`).join('')}</div>`;
 const card=function(it){
  const x=it.x;const isP=it.t==='p';const isSq=it.t==='s';
  const nm=isP?x.n.split(' ')[0]:(isSq?(x.sqn||'Squad'):x.n);

  return `<div style="margin:0 16px 9px;background:var(--card);border:1px solid var(--br);border-radius:16px;padding:13px 15px;display:flex;gap:11px;align-items:center;cursor:pointer" onclick="${dest}">${avt}<div style="flex:1;min-width:0"><div style="display:flex;gap:6px;align-items:center"><b style="font-size:14.5px;font-family:var(--head)">${esc(nm)}</b>${chip}</div><div style="font-size:11px;color:var(--tx3);font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(meta)}</div><div style="font-size:11.5px;color:var(--tx2);margin-top:4px">${esc(look)}</div></div><span class="lk2bk" onclick="event.stopPropagation();toggleSave('${it.id}')">${bkSvg(true)}</span></div>`;
 };
 const empty=`<div class="empty" style="padding:44px 32px"><div class="e"></div><h3>Nothing saved${tab==='all'?'':' here'} yet</h3><p style="font-size:13.5px;color:var(--tx2);margin-top:6px">Tap the bookmark on any card to keep it.</p><button class="lk2btn" style="margin-top:14px;padding:11px 18px" onclick="stack=['home'];render()">Browse the feed →</button></div>`;

function closeProject(prid){

  if(state._dbPR)state._dbPR=state._dbPR.filter(function(p){return p.id!==prid;});

  closeM();toast('Project deleted');stack=['you'];render();scrollTop();};

function formingCard(p){
 const team=teamOfSquad(p);
 const spots=(p.spots!=null)?p.spots:(p.need?p.need.length:3);
 const skills=(p.skills&&p.skills.length)?p.skills:((p.need&&p.need.length)?p.need:[]);
 const filledN=Math.max(team.length,1);
 const totalSlots=spots+1;
 const openN=Math.max(0,totalSlots-filledN);
 const col=C[p.c||1];
 // gefuellte Slots: schlicht auf soft-bg (erster = Started it, weitere = Skill)
 const filledSlots=team.slice(0,6).map((t,ix)=>`<div style="background:var(--soft);border-radius:12px;padding:9px 10px;display:flex;gap:8px;align-items:center;min-width:0"><div style="width:28px;height:28px;border-radius:50%;background:${t.c||C[1]};color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:800;font-size:11px;flex:0 0 auto;overflow:hidden;position:relative">${avImg(t)}${t.i}</div><div style="min-width:0"><div style="font-size:12px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((t.n||'Member').split(' ')[0])}</div><div style="font-size:10px;color:var(--tx3)">${ix===0?'Started it':(skills[ix-1]?esc(skills[ix-1]):'On board')}</div></div></div>`).join('');
 // offene Slots: rot-gestrichelt, Skill rot, "Tap to request"
 const openSlots=Array.from({length:Math.max(0,Math.min(totalSlots-filledN,6-Math.min(team.length,6)))}).map((_,k)=>{const sk=skills[team.length-1+k]||skills[k]||'Open role';return `<div onclick="event.stopPropagation();go('squad:${p.id}')" style="border:1.5px dashed var(--red);border-radius:12px;padding:9px 10px;display:flex;gap:8px;align-items:center;cursor:pointer;min-width:0"><div style="width:28px;height:28px;border-radius:50%;border:1.5px dashed var(--red);display:flex;align-items:center;justify-content:center;color:var(--red);font-weight:800;flex:0 0 auto">+</div><div style="min-width:0"><div style="font-size:12px;font-weight:800;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(sk)}</div><div style="font-size:10px;color:var(--tx3)">Tap to request</div></div></div>`;}).join('');
 // gleiche Form wie Looking-Cards (lk2): radius 20, farbiger Schatten statt Rahmen, gleiche margins
 return `<div class="sqcard" onclick="go('squad:${p.id}')" style="margin:10px 16px;background:var(--card);border-radius:20px;overflow:hidden;box-shadow:0 4px 18px rgba(255,43,43,.12),0 1px 3px rgba(17,20,26,.05);cursor:pointer">
 <div style="display:flex;gap:11px;align-items:center;padding:15px 18px 13px"><div style="width:44px;height:44px;border-radius:12px;background:${col};color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:800;font-size:17px;flex:0 0 auto;overflow:hidden;position:relative">${avImg(p)}${p.i||'S'}</div><div style="flex:1;min-width:0"><div style="display:inline-flex;padding:3px 9px;border-radius:100px;font-size:8.5px;font-weight:900;letter-spacing:.1em;font-family:var(--head);background:#FFF6F5;color:var(--red);margin-bottom:5px">SQUAD FORMING</div><div style="font-family:var(--head);font-weight:800;font-size:17px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.sqn||'Squad')}</div><div style="font-size:11.5px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">${esc(p.note||p.one||'Starting from zero \u2014 join if you want to build this.')}</div></div></div>
 <div style="height:1px;background:var(--br)"></div>
 <div style="padding:13px 18px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:9.5px;font-weight:900;letter-spacing:.08em;color:var(--tx3);font-family:var(--head)">THE SQUAD</span><span style="font-size:11px;font-weight:800;color:var(--tx3);font-family:var(--head)">${filledN} in \u00b7 ${openN} open</span></div>
 <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${filledSlots}${openSlots}</div></div>
 </div>`;
}

/* -- 3. REAL CONNECT: do_connect RPC (charges 10 coins, opens thread) -- */
function sendConnect(id,intent){
  var p=person(id); if(!p) return;
  if(!p._dbid){ toast('This profile is not connectable'); return; }
  if(!sb){ toast('Connection unavailable'); return; }
  var note=(state._note||'').trim();
  var full=(intent?('['+intent+'] '):'')+(note||('Hey '+p.n.split(' ')[0]+', let\u2019s connect.'));
  sb.rpc('do_connect',{target:p._dbid,note:full}).then(function(r){
    var d=r.data||{};
    if(d.error==='not_enough_coins'){ closeM(); openWallet(); toast('Not enough coins \u00b7 claim your daily first'); return; }
    if(d.error==='no_profile'){ closeM(); openOnboarding(); return; }
    if(d.error){ toast('Could not connect'); return; }
    state._note=''; state._intent=null;
    if(typeof d.balance==='number') state.coins=d.balance;
    closeM(); toast(d.charged?('Sent \u00b7 \u221210 coins'):'Already connected'); go('chat:'+d.thread);
  }).catch(function(){ toast('Could not connect'); });
}

  }
 }catch(e){}
}

async function saveProfile(){
  var msg=document.getElementById('onbMsg');
  var g=function(id){var e=document.getElementById(id);return e?(e.value||'').trim():'';};
  var name=g('onb_name'), one=g('onb_one');
  if(name.length<2){ if(msg)msg.textContent='Please enter your name.'; return; }
  if(one.length<4){ if(msg)msg.textContent='Add a short line about you.'; return; }
  if(!sb){ if(msg)msg.textContent='Connection unavailable \u2014 try on the live site.'; return; }
  var skills=g('onb_skills').split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(msg)msg.textContent='Saving\u2026';
  try{
    var ses=await sb.auth.getSession(); var user=ses.data.session&&ses.data.session.user;
    if(!user){ if(msg)msg.textContent='Please sign in again.'; openSignup(); return; }
    var payload={ name:name, kind:_onbKind, role:g('onb_role'), city:g('onb_city'),
      seeking:g('onb_seek'), one_liner:one, skills:skills, offering:g('onb_open'), availability:g('onb_avail') };
    if(ME.photo&&/^https?:/.test(ME.photo)) payload.photo_url=ME.photo;
    var r=await sb.rpc('save_profile',{p:payload});
    var d=r.data||{};
    if(r.error){ if(msg)msg.textContent='Could not save \u2014 '+r.error.message; return; }
    if(d.error==='email_taken'){ if(msg)msg.textContent='This email is already linked to another account. Log out and sign in with that account.'; return; }
    if(d.error){ if(msg)msg.textContent='Could not save ('+d.error+').'; return; }
    var pr=d.profile||{};
    ME.n=pr.name||name; ME.i=((ME.n||'?')[0]||'?').toUpperCase(); ME.kind=pr.kind||_onbKind;
    ME.role=pr.role||''; ME.city=pr.city||''; ME.look=pr.seeking||''; ME.one=pr.one_liner||'';
    ME.good=Array.isArray(pr.skills)?pr.skills:skills; ME.open=pr.offering||''; ME.avail=pr.availability||'';
    if(pr.photo_url)ME.photo=pr.photo_url;
    ME.email=user.email;
    var first=!state._onboarded;
    state._onboarded=true; state.signedUp=true; window._cardDraft=null;
    toast(first?'You\u2019re in the feed':'Card saved');
    if(cur()==='cardedit'){ stack.pop(); }
    go('you'); if(typeof loadFeed==='function') loadFeed(); if(typeof loadCoins==='function') loadCoins();
  }catch(e){ if(msg)msg.textContent='Could not save \u2014 '+String((e&&e.message)||e); }
}

function capCard(){
 if(!document.getElementById('onb_name')) return;
 var g=function(id){var e=document.getElementById(id);return e?e.value:'';};
 window._cardDraft={ name:g('onb_name'), role:g('onb_role'), city:g('onb_city'), seek:g('onb_seek'),
   one:g('onb_one'), skills:g('onb_skills'), open:g('onb_open'), avail:g('onb_avail'), kind:_onbKind,
   opt:(document.getElementById('optSec')||{}).style?document.getElementById('optSec').style.display!=='none':false };
}

async function notifyEvents(){
 if(!needAuth(notifyEvents)) return;
 if(!sb){ toast('Connection unavailable'); return; }
 var pid=await _myPid(); if(!pid){ openOnboarding(); return; }
 var r=await sb.from('notify_list').insert({profile_id:pid,email:ME.email||null,topic:'live_events'});
 if(r.error&&r.error.code!=='23505'){ toast('Could not save'); return; }
 state._evNotified=true; toast('You\u2019re on the list \u2014 we\u2019ll email you'); render();
}

async function toggleShowProjects(){
 ME.showProj=(ME.showProj===false)?true:false;
 var mine=(state._dbP||[]).find(function(x){return state._pid&&x._dbid===state._pid;}); if(mine) mine.showProj=ME.showProj;
 render(); toast(ME.showProj?'Projects visible on your card':'Projects hidden from your card');
 if(sb&&state.signedUp){ var u=await _uid(); if(u) sb.from('profiles').update({show_projects:ME.showProj}).eq('user_id',u).then(function(){}); }
}

function shareToYoubet(kind,id){
 var th=state._threads||[];
 var nm=shareName(kind,id);
 if(!th.length){ closeM(); toast('Connect with someone first \u2014 then you can share cards in chat'); return; }
 document.getElementById('modal').innerHTML=
  '<div style="text-align:center;font-family:var(--head);font-weight:800;font-size:17px;margin:2px 0 12px">Send '+_esc(nm)+' to\u2026</div>'+
  th.slice(0,12).map(function(t){
    return '<div class="mrow" onclick="doShareToThread(\''+t.id+'\',\''+kind+'\',\''+id+'\')"><div class="mrow-ic" style="background:'+C[t.c||0]+';border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:800;font-size:13px">'+(t.i||'?')+'</div><span class="mrow-t">'+_esc(t.n||'Chat')+'</span><svg class="mrow-chev" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg></div>';
  }).join('')+
  '<div class="m-close" onclick="closeM()">Cancel</div>';
 document.getElementById('mask').classList.add('on');

async function doShareToThread(tid,kind,id){
 closeM();
 if(!sb){ toast('Connection unavailable'); return; }
 var u=await _uid(); if(!u){ openSignup(); return; }
 var nm=shareName(kind,id);
 var txt=(kind==='person'?nm+' is on youbet \u2014 take a look: ':nm+' \u2014 take a look: ')+'https://youbet.network';
 var r=await sb.from('messages').insert({thread_id:tid,sender:u,body:txt});
 if(r.error){ toast('Could not send'); return; }
 toast('Sent'); go('chat:'+tid);
}

async function toggleCardPublic(){
 ME.isPublic=(ME.isPublic===false)?true:false;
 render();
 toast(ME.isPublic?'Your card is visible \u2014 people can find you':'Card hidden \u2014 you will not appear in the feed');
 if(sb&&state.signedUp){ var u=await _uid(); if(u) sb.from('profiles').update({is_public:ME.isPublic}).eq('user_id',u).then(function(){ if(typeof loadFeed==='function') loadFeed(); }); }
}

async function loadCoins(){
  if(!sb) return;
  var _u=await _uid(); if(!_u) return;
  try{
    var r=await sb.rpc('my_coins');
    if(r.data&&!r.data.error){
      state.coins=r.data.balance||0; state.streak=r.data.streak||0; state._coinsLoaded=true;
      if(r.data.gap===0){ state.lastClaim=todayKey(); } else if(r.data.gap===1){ state.lastClaim=yesterdayKey(); } else { state.lastClaim=null; }
      render();
      if(typeof loadMyStats==='function') loadMyStats();
      setTimeout(function(){ if(typeof loadMySaves==='function') loadMySaves(); }, 1500);
    }
  }catch(e){}
}

function toggleSkillChip(sk){
 var e=document.getElementById('onb_skills'); if(!e) return;
 var arr=e.value.split(',').map(function(x){return x.trim();}).filter(Boolean);
 var i=arr.findIndex(function(x){return x.toLowerCase()===sk.toLowerCase();});
 if(i>=0)arr.splice(i,1); else arr.push(sk);
 e.value=arr.join(', ');
 syncSkillChips(); if(typeof updCardPv==='function')updCardPv();
}
function syncSkillChips(){
 var e=document.getElementById('onb_skills'); if(!e) return;
 var arr=e.value.split(',').map(function(x){return x.trim().toLowerCase();}).filter(Boolean);
 document.querySelectorAll('.skchip').forEach(function(c){
  var on=arr.indexOf(c.getAttribute('data-sk').toLowerCase())>=0;
  c.style.borderColor=on?'var(--red)':'var(--line)';
  c.style.background=on?'#FFF6F5':'#fff';
  c.style.color=on?'var(--red)':'inherit';
 });
 document.querySelectorAll('.skchipS').forEach(function(c){
  var on=arr.indexOf(c.getAttribute('data-sk').toLowerCase())>=0;
  if(on){c.style.background='var(--red)';c.style.color='#fff';c.style.borderColor='var(--red)';c.style.fontWeight='800';c.style.boxShadow='0 3px 10px rgba(255,43,43,.25)';c.textContent='\u2713 '+c.getAttribute('data-sk');}
  else{c.style.background='#fff';c.style.color='var(--tx)';c.style.borderColor='var(--line)';c.style.fontWeight='700';c.style.boxShadow='none';c.textContent=c.getAttribute('data-sk');}
 });
}
