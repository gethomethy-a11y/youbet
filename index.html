/* ===== top nav ===== */

/* ===== bottom nav ===== */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--br);height:64px;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;z-index:90}

.buycoinsbtn{margin:10px 20px 0;width:calc(100% - 40px);background:#fff;border:1.5px solid var(--tx);color:var(--tx);border-radius:12px;padding:13px;font-family:var(--head);font-weight:800;font-size:14px}

.dsec{padding:18px 20px 0}

/* premium (Pro) screen */
.phero{margin:20px 20px 0;border-radius:20px;padding:26px 22px;background:var(--red);color:#fff}

<body>
<div class="phone" id="app"></div>
<div id="toast"></div>
<script>
/* ================== BACKEND (Supabase) ================== */
const CFG = window.YB_CONFIG || {DEMO:true};
const DEMO = CFG.DEMO !== false;   // default: demo/preview mode
let sb = null;
if(!DEMO && window.supabase){ sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {auth:{detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'pkce'}}); }

// Avatar color palette (matches DB avatar_color int index)
const AV_COLORS = ['#FF2B2B','#10B981','#6366f1','#EC4899','#F59E0B','#0EA5E9','#8B5CF6','#F97316'];

const YB = {
  demo(){ return DEMO; },
  // ---- AUTH ----
  async signUpEmail(email, pw, stay){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signUp({email, password:pw});
    if(error) return {ok:false, error:error.message};
    return {ok:true, user:data.user};
  },
  async signInEmail(email, pw, stay){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signInWithPassword({email, password:pw});
    if(error) return {ok:false, error:error.message};
    return {ok:true, user:data.user};
  },
  async signInOAuth(provider){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signInWithOAuth({provider, options:{redirectTo:location.origin}});
    if(error) return {ok:false, error:error.message};
    return {ok:true};
  },
  async signOut(){
    if(DEMO) return {ok:true};
    await sb.auth.signOut();
    return {ok:true};
  },
  async currentUser(){
    if(DEMO) return null;
    const {data} = await sb.auth.getUser();
    return data ? data.user : null;
  },
  onAuth(cb){
    if(DEMO || !sb) return;
    sb.auth.onAuthStateChange((_e,session)=>cb(session ? session.user : null));
  },
  // ---- PROFILE ----
  async myProfile(userId){
    if(DEMO) return null;
    const {data} = await sb.from('profiles').select('*').eq('user_id',userId).maybeSingle();
    return data;
  },
  async saveProfile(userId, p){
    if(DEMO) return {ok:true};
    const row = {
      user_id:userId, name:p.n, role:p.role, city:p.loc, one_liner:p.bio,
      skills:p.goodat||[], onboarded:true, avatar_color:p.avatar_color||0
    };
    const {error} = await sb.from('profiles').upsert(row, {onConflict:'user_id'});
    return error ? {ok:false,error:error.message} : {ok:true};
  },
  // ---- FEED (uses existing public_feed RPC) ----
  async feed(){
    if(DEMO) return {people:[],projects:[]};
    try{
      const {data:rows} = await sb.rpc('public_feed');
      const people=[], projects=[];
      (rows||[]).forEach(r=>{
        const mapped = mapRowToEntity(r);
        if(r.kind==='project') projects.push(mapped); else people.push(mapped);
      });
      // projects table (separate) too
      const {data:projRows} = await sb.from('projects').select('*').eq('status','live').order('created_at',{ascending:false}).limit(50);
      (projRows||[]).forEach(p=>projects.push(mapProjectRow(p)));
      return {people, projects};
    }catch(e){ return {people:[],projects:[]}; }
  },
  // ---- CREDITS (uses my_coins RPC) ----
  async myCoins(){
    if(DEMO) return 50;
    try{ const {data} = await sb.rpc('my_coins'); return (data && (data.balance!=null?data.balance:data)) || 0; }
    catch(e){ return 0; }
  },
  async credits(profileId){ return this.myCoins(); },
  async claimDaily(){
    if(DEMO) return {ok:true, balance:null};
    try{ const {data,error}=await sb.rpc('claim_daily'); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- CONNECT (uses do_connect RPC — handles credit spend + thread) ----
  async connect(targetPid, note){
    if(DEMO) return {ok:true};
    try{ const {data,error}=await sb.rpc('do_connect',{target:targetPid, note:note||null}); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- SAVE PROFILE (uses save_profile RPC) ----
  async saveProfileRPC(p){
    if(DEMO) return {ok:true};
    try{ const {data,error}=await sb.rpc('save_profile',{p}); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- CAMPFIRE ----
  async campfire(){
    if(DEMO) return [];
    const today=new Date().toISOString().slice(0,10);
    const {data} = await sb.from('campfire_answers').select('*').eq('day_key',today).order('created_at',{ascending:false});
    return data||[];
  },
  async postCampfire(profileId, name, body){
    if(DEMO) return {ok:true};
    const {error} = await sb.from('campfire_answers').insert({profile_id:profileId, name, body});
    return error ? {ok:false,error:error.message} : {ok:true};
  },
  // ---- INBOX / THREADS / MESSAGES ----
  async inbox(){
    if(DEMO) return [];
    try{
      const {data,error}=await sb.rpc('my_inbox');
      if(error||!data) return [];
      return Array.isArray(data)?data:[];
    }catch(e){ return []; }
  },
  async messages(threadId){
    if(DEMO) return [];
    try{
      const {data} = await sb.from('messages').select('*').eq('thread_id',threadId).order('created_at',{ascending:true});
      return data||[];
    }catch(e){ return []; }
  },
  async sendMessage(threadId, sender, body){
    if(DEMO) return {ok:true};
    const {error} = await sb.from('messages').insert({thread_id:threadId, sender, body});
    return error ? {ok:false,error:error.message} : {ok:true};
  },
  async markRead(threadId){
    if(DEMO) return {ok:true};
    try{ await sb.rpc('mark_thread_read',{tid:threadId}); return {ok:true}; }
    catch(e){ return {ok:false}; }
  },
  // ---- PAYMENTS (Stripe Payment Links) ----
  stripeLink(key){
    const S = (CFG.STRIPE||{});
    return S[key] || '';
  },
  openCheckout(key, refId){
    const base = this.stripeLink(key);
    if(!base) return {ok:false, missing:true};
    // client_reference_id lets your Stripe webhook credit the right profile
    let url = base;
    if(refId){ url += (base.includes('?')?'&':'?') + 'client_reference_id=' + encodeURIComponent(refId); }
    window.open(url, '_blank');
    return {ok:true};
  },
  // ---- PHOTO UPLOAD (media bucket) ----
  async uploadPhoto(file){
    if(DEMO) return {ok:true, url:null};
    try{
      const user = await this.currentUser();
      if(!user) return {ok:false, error:'not signed in'};
      const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
      const path = `${user.id}/${Date.now()}.${ext}`;
      const {error} = await sb.storage.from('media').upload(path, file, {upsert:true, contentType:file.type||'image/jpeg'});
      if(error) return {ok:false, error:error.message};
      const {data} = sb.storage.from('media').getPublicUrl(path);
      return {ok:true, url:(data && data.publicUrl) || null};
    }catch(e){ return {ok:false, error:String(e)}; }
  },
  async savePhotoUrl(url){
    if(DEMO) return {ok:true};
    return this.saveProfileRPC({photo_url:url});
  },
  // ---- NOTIFY (email on connect/join) ----
  async notifyConnect(toPid, fromName, note, isProject){
    if(DEMO) return {ok:true};
    try{
      await fetch(CFG.SUPABASE_URL+'/functions/v1/notify-connect', {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':CFG.SUPABASE_KEY,'Authorization':'Bearer '+CFG.SUPABASE_KEY},
        body:JSON.stringify({to_pid:toPid, from_name:fromName||'Someone', note:note||'', is_project:!!isProject})
      });
      return {ok:true};
    }catch(e){ return {ok:false,error:String(e)}; }
  },
  async setNotifyOptOut(optOut){
    if(DEMO) return {ok:true};
    try{
      const user=await this.currentUser();
      if(!user) return {ok:false};
      const {error}=await sb.from('profiles').update({notify_opt_out:!!optOut}).eq('user_id',user.id);
      return error?{ok:false,error:error.message}:{ok:true};
    }catch(e){ return {ok:false,error:String(e)}; }
  },
  async sendWelcome(email, name){
    if(DEMO) return {ok:true};
    try{
      await fetch(CFG.SUPABASE_URL+'/functions/v1/send-welcome', {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':CFG.SUPABASE_KEY,'Authorization':'Bearer '+CFG.SUPABASE_KEY},
        body:JSON.stringify({email, name:name||''})
      });
      return {ok:true};
    }catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- SEARCH ----
  async searchProfiles(q){
    if(DEMO) return null; // demo falls back to local search
    try{
      const {data,error}=await sb.rpc('search_profiles',{q:q||''});
      if(error||!data) return [];
      return (Array.isArray(data)?data:[]).map(r=>mapRowToEntity(r));
    }catch(e){ return []; }
  },
  // ---- PROJECTS ----
  async createProject(p){
    if(DEMO) return {ok:true, project:null};
    try{
      const {data,error}=await sb.rpc('create_project',{p});
      if(error) return {ok:false,error:error.message};
      if(data&&data.error) return {ok:false,error:data.error};
      return {ok:true, project:(data&&data.project)||null};
    }catch(e){ return {ok:false,error:String(e)}; }
  },
};

function renderSearchResults(){
  const q=(S.searchQ||'').toLowerCase().trim();
  // LIVE: server-side search (debounced)
  if(!YB.demo()){
    if(!q){ const el0=document.getElementById('searchResults'); if(el0)el0.innerHTML=searchResultsHtml('',[]); return; }
    clearTimeout(window._searchT);
    window._searchT=setTimeout(async ()=>{
      const cur=(S.searchQ||'').toLowerCase().trim();
      if(!cur)return;
      const ents=await YB.searchProfiles(cur);
      // stash results so dirRow/E can find them
      (ents||[]).forEach(e=>{ S.people[e.id]=S.people[e.id]||e; });
      const ids=(ents||[]).map(e=>e.id);
      const el=document.getElementById('searchResults');
      if(el && (S.searchQ||'').toLowerCase().trim()===cur) el.innerHTML=searchResultsHtml(cur,ids);
    },250);
    // show a light loading state immediately
    const el=document.getElementById('searchResults');
    if(el)el.innerHTML=`<div class="empty" style="text-align:center;color:var(--tx3);font-size:13.5px;padding:40px">Searching…</div>`;
    return;
  }
  // DEMO: local search over loaded entities
  const all=Object.keys(S.people).concat(Object.keys(S.projects)).filter(id=>id!=='you_self'&&id!=='myproj');
  const results=q?all.filter(id=>{const e=E(id);if(!e)return false;
    const hay=[e.n,e.meta,e.about,(e.brings||[]).join(' '),(e.roles||[]).map(r=>r.t).join(' ')].join(' ').toLowerCase();
    return hay.includes(q);}):[];
  const el=document.getElementById('searchResults');if(el)el.innerHTML=searchResultsHtml(q,results);
}

async function handlePhotoFile(file){

    if(!up.ok||!up.url){ toast(up.error||'Upload failed — kept locally'); return; }
    if(target==='me')S.me.photo=up.url;
    else if(target==='ob')OB.photo=up.url;
    else if(target==='np')S.npPhoto=up.url;
    if(target==='me'||target==='ob'){ await YB.savePhotoUrl(up.url); }
    toast('Photo updated'); render();
  };
  reader.readAsDataURL(workFile);
}
// Resize an image file so its longest side <= maxPx, re-encode as JPEG.
function compressImage(file, maxPx, quality){
  return new Promise((resolve,reject)=>{
    if(!file.type || !file.type.startsWith('image/')) return resolve(file);
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      let {width:w, height:h}=img;
      if(w<=maxPx && h<=maxPx){ URL.revokeObjectURL(url); return resolve(file); } // already small
      if(w>h){ h=Math.round(h*maxPx/w); w=maxPx; } else { w=Math.round(w*maxPx/h); h=maxPx; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cv.toBlob(blob=>{
        if(!blob) return resolve(file);
        const name=(file.name||'photo').replace(/\.[^.]+$/,'')+'.jpg';
        resolve(new File([blob], name, {type:'image/jpeg'}));
      }, 'image/jpeg', quality||0.85);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('decode failed')); };
    img.src=url;
  });
}

    if(user){ await YB.sendMessage(c.threadId, user.id, body); }
  }
}
async function claim(){
  if(S.claimedToday)return toast('Already claimed today');
  if(!YB.demo()){
    const res=await YB.claimDaily();
    if(!res.ok){ toast(res.error||'Already claimed today'); S.claimedToday=true; render(); return; }
    S.claimedToday=true;
    S.coins = (res.balance!=null?res.balance:await YB.myCoins());
    toast('Daily reward claimed');render();return;
  }
  S.claimedToday=true;S.coins+=10;toast('+10 coins claimed');render();
}
function earnRow(key,title,sub,amt){
  // auto-detect completion for profile & post; others claim on action
  let done=S.earned[key];
  if(key==='profile'&&(S.me.bio&&S.me.goodat&&S.me.goodat.length))done=done||S.earned.profile;
  const canAuto=(key==='profile'&&S.me.bio&&S.me.goodat&&S.me.goodat.length&&!S.earned.profile)||(key==='post'&&S.people.you_self&&S.people.you_self.ask&&!S.earned.post);
  let btn;
  if(done){btn=`<span class="ev claimed">Claimed ✓</span>`;}
  else if(canAuto){btn=`<button class="earnbtn" onclick="claimEarn('${key}',${amt})">Claim +${amt}</button>`;}
  else{btn=`<button class="earnbtn go" onclick="earnGo('${key}')">+${amt}</button>`;}
  return `<div class="erow"><div class="ei">${amt>=100?'+1':amt>=50?'i':'b'}</div><div class="eb"><div class="et">${title}</div><div class="es">${sub}</div></div>${btn}</div>`;
}
function claimEarn(key,amt){
  if(S.earned[key])return toast('Already claimed');
  S.earned[key]=true;S.coins+=amt;toast(`+${amt} coins earned`);render();
}
function earnGo(key){
  // route to the action that earns it
  if(key==='profile')return go('editme');
  if(key==='post')return go('compose');
  if(key==='campfire'){go('net');S.netTab='campfire';setTimeout(()=>toast('Answer the question to earn +15'),200);return render();}
  if(key==='share')return openShare(ensureMe()?'you_self':'you_self');
  if(key==='invite')return openInvite();
}
function acceptReq(id){
  const r=S.requests.find(x=>x.id===id);
  // Live: the thread already exists — accepting just opens the conversation
  if(!YB.demo() && r && r.threadId){
    S.requests=S.requests.filter(x=>x.id!==id);
    if(!S.chats.find(c=>c.id===id))S.chats.unshift({id,threadId:r.threadId,msgs:[{me:0,t:r.note||''}],time:'now',unread:false,accepted:true});
    S.inboxTab='msgs';toast(`Opening chat with ${E(id).n}`);openChat(id);
    return;
  }
  S.requests=S.requests.filter(x=>x.id!==id);
  if(!S.chats.find(c=>c.id===id))S.chats.unshift({id,msgs:[{me:0,t:r?`${r.intent}. ${r.note}`:'Hey! Excited to connect.'}],time:'now',unread:true});
  toast(`Accepted ${E(id).n}`);S.inboxTab='msgs';render();
}
function ignoreReq(id){S.requests=S.requests.filter(r=>r.id!==id);toast('Ignored');render();}
function pickOne(el,group){document.querySelectorAll('#'+group+' .chip, #'+group+' .stagechip').forEach(c=>c.classList.remove('on'));el.classList.add('on');}
function composePerson(){S.view='composePerson';S.stack.push('compose');render();}
function composeRole(id){S.myproject=E(id)||S.myproject;S.view='composeRole';S.stack.push('compose');render();}
function ensureMe(){S.people.you_self=S.people.you_self||{id:'you_self',type:'person',n:S.me.n,c:'#111111',meta:`${S.me.role} · ${S.me.loc}`,about:S.me.bio,brings:S.me.goodat.slice(),ask:'',give:''};}
function publishPerson(){
  const ask=(document.getElementById('cp_ask')||{}).value||'';
  const give=(document.getElementById('cp_give')||{}).value||'';
  if(!ask.trim())return toast('Write what you’re looking for');
  ensureMe();
  S.people.you_self.ask=ask.replace(/(co-?founder|engineer|marketer|designer|investor|partner|developer)/i,'<span class="h">$1</span>');
  S.people.you_self.give=give.trim()?`<b>Brings:</b> ${give.trim()}`:'';
  if(!S.feed.includes('you_self'))S.feed.unshift('you_self');
  S.view=null;S.stack=[];toast('Posted');go('home');
}
function stashNP(){
  const g=id=>(document.getElementById(id)||{}).value;
  if(g('np_name')!==undefined)S.npName=g('np_name');
  if(g('np_what')!==undefined)S.npWhat=g('np_what');
}
function addTeammate(){
  const n=(document.getElementById('tm_n')||{}).value||'';
  const r=(document.getElementById('tm_r')||{}).value||'';
  if(!n.trim())return toast('Enter a name');
  stashNP();
  S.npTeam.push({n:n.trim(),role:r.trim()||'Team'});
  S.npAdding=false;render();
}
function rmTeammate(i){stashNP();S.npTeam.splice(i,1);render();}
function createProject(){
  const name=((document.getElementById('np_name')||{}).value||S.npName||'').trim();
  const what=((document.getElementById('np_what')||{}).value||S.npWhat||'').trim();
  if(!name)return toast('Name your project');
  const cat=(document.querySelector('#np_cat .chip.on')||{}).textContent||'Project';
  const stageEl=document.querySelector('#np_stage .stagechip.on');
  const stage=stageEl?[...document.querySelectorAll('#np_stage .stagechip')].indexOf(stageEl):1;
  const cols=['#EC4899','#0EA5E9','#EAB308','#10B981','#6366f1','#F97316'];
  const id='myproj_'+Date.now();
  const team=[{n:S.me.n,c:'#111111',role:'Founder',tag:'Founder'},...(S.npTeam||[]).map((m,i)=>({n:m.n,c:cols[i%cols.length],role:m.role,tag:/cofounder/i.test(m.role)?'Cofounder':'Team'}))];
  S.projects[id]={id,type:'project',n:name,c:S.npPhoto||'#111111',meta:`${cat} · new`,about:what||'New project.',brings:[],ask:'',give:'',stage,team,roles:[],photo:S.npPhoto};
  S.myprojects=S.myprojects||{}; S.myprojects[id]=S.projects[id];
  S.myproject=S.projects[id];S.npTeam=[];S.npAdding=false;S.npName='';S.npWhat='';S.npPhoto=null;
  toast('Project created');composeRole(id);
}
async function publishRole(){
  const role=(document.getElementById('cr_role')||{}).value||'';
  const detail=(document.getElementById('cr_detail')||{}).value||'';
  if(!role.trim())return toast('Name the role');
  const offers=[...document.querySelectorAll('#cr_offer .chip.on')].map(c=>c.textContent);
  const p=S.myproject;
  p.roles=p.roles||[];p.roles.push({t:role.trim(),s:detail.trim()||offers.join(' · ')});
  p.ask=`Looking for a <span class="h">${role.trim()}</span>${detail.trim()?' — '+detail.trim():''}.`;
  p.give=offers.length?`<b>Offers:</b> ${offers.join(', ')}`:'';

  // ---- LIVE: persist the project to the DB, then reload feed ----
  if(!YB.demo()){
    toast('Publishing…');
    const stageNames=['idea','building','raising','scaling'];
    const catName=(p.meta||'').split(' · ')[0]||'Project';
    const res=await YB.createProject({
      name:p.n,
      story:p.about||'',
      tagline:detail.trim()||'',
      category:catName,
      stage:stageNames[p.stage||1]||'building',
      looking_for:role.trim(),
      deal:offers.join(', '),
      city:S.me.loc||'',
      logo_url:(typeof p.photo==='string'&&p.photo.startsWith('http'))?p.photo:''
    });
    if(!res.ok){ toast(res.error||'Could not publish project'); return; }
    // replace local temp project with the real one from DB
    if(res.project){
      const rp=mapProjectRow(res.project);
      const tempId=p.id;
      delete S.projects[tempId];
      if(S.myprojects){ delete S.myprojects[tempId]; }
      S.projects[rp.id]=rp; S.myproject=rp;
      S.myprojects=S.myprojects||{}; S.myprojects[rp.id]=rp;
      if(!S.feed.includes(rp.id))S.feed.unshift(rp.id);
    }
    S.view=null;S.stack=[];toast('Project posted');go('home');
    loadFeed();
    return;
  }

  // ---- DEMO ----
  if(!S.feed.includes(p.id))S.feed.unshift(p.id);
  S.view=null;S.stack=[];toast('Role posted');go('home');
}
// Load real inbox (threads + requests) from Supabase into S (live only)
async function loadInbox(){
  if(YB.demo()) return;
  try{
    const user = await YB.currentUser();
    const rows = await YB.inbox();
    const chats=[]; const requests=[];
    (rows||[]).forEach(r=>{
      const oid = r.other_pid || r.other_user;
      // ensure the counterpart exists as an entity for E()/av()
      const col = AV_COLORS[(r.other_color||0) % AV_COLORS.length];
      S.people[oid] = S.people[oid] || {
        id:oid, type:'person', n:r.other_name||'Someone', c:col,
        meta:[r.other_role, r.other_city].filter(Boolean).join(' · '),
        about:'', brings:[], ask:'', give:'', pro:!!r.other_premium, photo:r.other_photo||null
      };
      const lastFromMe = user && r.last_sender===user.id;
      chats.push({
        id:oid, threadId:r.thread_id,
        msgs:[{me:lastFromMe?1:0, t:r.last_body||''}],
        time:relTime(r.last_at||r.last_at_msg),
        unread:(r.unread||0)>0,
        accepted:true, pending:false
      });
      // inbound pending (they wrote, I haven't replied) -> also surface as a request
      if(r.inbound_pending){
        requests.push({id:oid, threadId:r.thread_id, note:r.last_body||'', intent:'wants to connect'});
      }
    });
    S.chats = chats;
    S.requests = requests;
    render();
  }catch(e){}
}
// small relative-time helper
function relTime(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60)return 'now'; if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h'; if(s<604800)return Math.floor(s/86400)+'d';
  return d.toLocaleDateString();
}
// Load real feed data from Supabase into S (live only)
async function loadFeed(){
  if(YB.demo()) return;
  try{
    const {people,projects} = await YB.feed();
    S.people={}; S.projects={}; S.feed=[]; S.myprojects={};
    people.forEach(p=>{ if(p.id===S.me.pid) return; S.people[p.id]=p; S.feed.push(p.id); });
    projects.forEach(p=>{ S.projects[p.id]=p; S.feed.push(p.id); if(p.owner && p.owner===S.me.pid){ S.myprojects[p.id]=p; } });
    // campfire
    try{
      const camp = await YB.campfire();
      S.camp = camp.map(a=>({id:a.id, who:a.profile_id||'anon', t:a.body, n:0, _name:a.name}));
    }catch(e){}
    render();
    // inbox depends on S.people not being wiped afterwards -> load it after the feed
    loadInbox();
  }catch(e){}
}
// Route a signed-in user to the right place (called on boot + after OAuth redirect)
async function routeSignedInUser(user){
  if(!user) return false;
  let prof=null;
  try{ prof=await YB.myProfile(user.id); }catch(e){}
  if(prof){ mapProfileToMe(prof); try{S.coins=await YB.myCoins();}catch(e){} }
  else { S.me.email=user.email||S.me.email; }
  if(prof && prof.onboarded){
    // returning, complete user -> straight into the app
    S.onboarding=false; S.view=null; S.stack=[]; render(); loadFeed();
  } else {
    // new user (e.g. first Google sign-in) -> finish profile setup
    S.onboarding=true; OB.mode='signup'; OB.step='role';
    if(user.email && !OB.email) OB.email=user.email;
    render();
  }
  return true;
}
async function boot(){
  // Live: check for an existing session (this IS "stay logged in" — Supabase persists it)
  if(!YB.demo()){
    // If we just came back from an OAuth redirect, the URL carries the session.
    const hasCode = /[?&]code=/.test(location.search);
    const hasToken = /[#&]access_token=/.test(location.hash);
    const hasErr = /[#?&]error=/.test(location.hash+location.search);
    const cameFromOAuth = hasCode || hasToken;

    if(hasErr){
      // surface Google/Supabase errors instead of silently returning to login
      try{
        const p=new URLSearchParams((location.hash||location.search).replace(/^[#?]/,''));
        const msg=p.get('error_description')||p.get('error')||'Login failed';
        setTimeout(()=>toast(decodeURIComponent(msg.replace(/\+/g,' '))),300);
      }catch(e){}
    }

    try{
      // PKCE flow returns ?code=... which must be exchanged for a session
      if(hasCode && sb.auth.exchangeCodeForSession){
        try{ await sb.auth.exchangeCodeForSession(location.href); }catch(e){ console.warn('exchange failed',e); }
      }
      let user = await YB.currentUser();
      // session from URL can take a beat — retry briefly after a redirect
      if(!user && cameFromOAuth){
        for(let i=0;i<12 && !user;i++){ await new Promise(r=>setTimeout(r,300)); user=await YB.currentUser(); }
      }
      if(user){ await routeSignedInUser(user); }
    }catch(e){ console.warn('boot auth error',e); }

    // clean the OAuth params out of the address bar
    if(cameFromOAuth && history.replaceState){
      try{ history.replaceState({}, document.title, location.origin+location.pathname); }catch(e){}
    }
    // react to any later auth change (covers slow redirects)
    YB.onAuth(async (user)=>{
      if(user && S.onboarding && OB.step==='login'){ await routeSignedInUser(user); }
    });
  }
  render();
}
boot();
