<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#FF2B2B;--tx:#11141A;--tx2:#5B6470;--tx3:#9AA1AD;--bg:#FFFFFF;--soft:#FAFAFB;--br:#EEEFF1;--br2:#E4E6E9;--green:#067A46;--gold:#D9A441;--head:'Inter Tight',sans-serif;--body:'Inter',sans-serif}
html,body{background:#111}
body{font-family:var(--body);color:var(--tx)}

button{font-family:var(--body);cursor:pointer;border:none;background:none}
.phone{max-width:440px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative}
.screen{display:none;min-height:100vh;padding-bottom:76px}
.screen.on{display:block}

/* ===== top nav ===== */
.nav{background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--br);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px 0 20px;position:sticky;top:0;z-index:60}
.logo{display:flex;align-items:center;gap:7px;cursor:pointer}
.logo svg{width:24px;height:24px;border-radius:7px}

.logo-wm em{color:var(--red);font-style:normal}
.nav-r{display:flex;align-items:center;gap:13px}
.coinchip{display:inline-flex;align-items:center;gap:6px;font-family:var(--head);cursor:pointer}
.coinchip .n{font-weight:800;font-size:14px}
.m{width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:900;font-size:9.5px;flex-shrink:0}
.m.red{background:var(--red);color:#fff}
.m.gold{background:var(--gold);color:#fff}
.pfp{width:32px;height:32px;border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0}
.loginbtn{background:var(--tx);color:#fff;border:none;border-radius:100px;padding:8px 18px;font-family:var(--head);font-weight:800;font-size:13px;cursor:pointer;flex-shrink:0}
.youtag{display:inline-block;background:var(--soft);color:var(--tx2);font-size:10px;font-weight:800;padding:2px 7px;border-radius:100px;vertical-align:middle;margin-left:4px}
.signin-note{text-align:center;padding:64px 40px 40px}
.signin-note .sn-ic{width:52px;height:52px;border-radius:50%;background:var(--soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.signin-note .sn-ic svg{width:24px;height:24px;color:var(--tx2)}
.signin-note .sn-t{font-family:var(--head);font-weight:800;font-size:19px;color:var(--tx);margin-bottom:8px}
.signin-note .sn-s{font-size:14px;color:var(--tx3);line-height:1.5;margin-bottom:22px;max-width:280px;margin-left:auto;margin-right:auto}
.signin-note .sn-btn{background:var(--tx);color:#fff;border:none;border-radius:100px;padding:13px 26px;font-family:var(--head);font-weight:800;font-size:14px;cursor:pointer}
.signin-bar{display:flex;align-items:center;gap:8px;margin:12px 20px 0;padding:11px 15px;background:var(--soft);border-radius:12px;font-size:13px;color:var(--tx2);cursor:pointer}
.signin-bar b{color:var(--tx);font-weight:800}
.signin-bar .sb-ar{margin-left:auto;color:var(--tx3);font-size:16px}
.backbar{height:56px;display:flex;align-items:center;gap:6px;padding:0 12px;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:60}
.backbtn{font-size:22px;color:var(--tx);padding:8px 10px;line-height:1}
.backttl{font-family:var(--head);font-weight:800;font-size:16.5px}
.chattl{display:flex;align-items:center;gap:9px;cursor:pointer;flex:1;min-width:0}

.blockrow{text-align:center;padding:22px}
.blocklink{font-size:12.5px;color:var(--tx3);cursor:pointer;font-weight:500;border-bottom:1px solid transparent}
.blocklink:active{color:var(--red)}
.blockbtn{display:inline-flex;align-items:center;gap:8px;color:var(--red);font-size:13.5px;font-weight:700;background:none;border:1px solid #F3C6C6;border-radius:100px;padding:9px 18px;cursor:pointer}
.blockbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.blockbtn:active{background:#FFF1EF}
.blockhint{font-size:11.5px;color:var(--tx3);margin-top:8px}
.lockmini{font-size:10.5px;font-weight:800;color:var(--gold);background:#FFFBF2;border:1px solid var(--gold);border-radius:100px;padding:1px 7px;margin-left:6px;vertical-align:middle}
.rolerow{cursor:pointer;border-radius:12px;transition:background .15s}

.rolenote{margin:0 20px 14px;font-size:12.5px;color:var(--tx2);background:var(--soft);border:1px solid var(--br);border-radius:10px;padding:10px 13px}
.pronote{margin:0 20px 14px;border:1px solid var(--gold);background:#FFFBF2;border-radius:14px;padding:16px 18px;cursor:pointer}
.pronote .pnt{font-family:var(--head);font-weight:800;font-size:15px}
.pronote .pns{font-size:12.5px;color:var(--tx2);margin:5px 0 10px;line-height:1.45}
.pronote .pnb{display:inline-block;background:var(--gold);color:#fff;border-radius:100px;padding:7px 16px;font-size:12.5px;font-weight:800}

/* ===== bottom nav ===== */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--br);height:64px;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;z-index:90}

.guestbars{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--br);padding:12px 20px calc(12px + env(safe-area-inset-bottom));z-index:90;display:flex;flex-direction:column;gap:9px}

.rrow{display:flex;align-items:center;gap:12px;padding:10px 20px;border-top:1px solid var(--br)}
.rrow.first{border-top:none}
.rplus{width:38px;height:38px;border-radius:10px;border:1.5px dashed var(--br2);color:var(--tx3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rt{font-family:var(--head);font-weight:800;font-size:15px}
.rs{font-size:11.5px;color:var(--tx2);margin-top:1px;line-height:1.35}
.rapply{margin-left:auto;color:var(--red);font-weight:800;font-size:13px;font-family:var(--head);flex-shrink:0;white-space:nowrap}
.rapply:active{opacity:.55}
.rrow.tap{cursor:pointer}
.rrow.tap:active{background:var(--soft)}
.rrow.inteam{padding-left:0;padding-right:0}
.rrow.inteam .rplus{width:40px;height:40px}
.pcta-ico{width:50px;height:50px;flex:0 0 auto;border-radius:13px;border:1px solid var(--br2);background:#fff;color:var(--tx2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.pcta-ico.on{color:var(--red)}
.pcta-ico svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tx3);flex:1;font-size:10.5px;font-weight:700}
.bn .bic{width:23px;height:23px;display:flex;align-items:center;justify-content:center;position:relative}
.bnbadge{position:absolute;top:-5px;right:-7px;min-width:16px;height:16px;padding:0 4px;background:var(--red);color:#fff;border-radius:100px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1;border:1.5px solid #fff}
.bn .bic svg{width:23px;height:23px}
.bn.on{color:var(--tx)}

/* ===== home ===== */
.hline{font-family:var(--head);font-weight:800;font-size:23px;letter-spacing:-.5px;padding:22px 20px 0;line-height:1.16}
.hline .u{color:var(--red)}
.hsub{font-size:13px;color:var(--tx2);padding:7px 20px 0;font-weight:500}
.composer{margin:16px 20px 0;background:var(--soft);border:1px solid var(--br);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:11px;cursor:pointer}

.composer .cplus{color:var(--red);font-size:13.5px;font-weight:800}
.tabs{display:flex;gap:22px;padding:16px 20px 0;border-bottom:1px solid var(--br);overflow-x:auto}

.tab.on.redt{color:var(--red)}
.tab.on.redt::after{background:var(--red)}
.feed{padding:0 20px}
.post{padding:20px 0;border-bottom:1px solid var(--br)}
.p-top{display:flex;align-items:center;gap:11px;margin-bottom:10px;cursor:pointer}

.p-av{width:38px;height:38px;border-radius:10px;font-size:14px}
.p-av.person{border-radius:50%}
.p-nm{font-size:14.5px;font-weight:700}
.p-mta{font-size:12px;color:var(--tx2);font-weight:500;margin-top:2px}
.p-ask{font-size:15.5px;line-height:1.45;font-weight:500;cursor:pointer}
.p-ask .h{font-weight:700}
.p-give{font-size:13.5px;color:var(--tx2);margin-top:8px;line-height:1.45}
.p-give b{color:var(--tx);font-weight:700}
.acts{display:flex;align-items:center;gap:8px;margin-top:14px}
.hi{background:var(--tx);color:#fff;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
.hi.mineflag{background:var(--soft);color:var(--tx3);border:1px solid var(--br)}
.hi.open{background:#fff;color:var(--tx);border:1.5px solid var(--tx)}
.hi.applied{background:var(--soft);color:var(--tx2);border:1px solid var(--br2)}
.hi.member{background:#EAF7EF;color:var(--green);border:1px solid #BEE6CE}
.teambanner{display:flex;align-items:center;gap:9px;margin:14px 20px 0;padding:12px 15px;background:#EAF7EF;border:1px solid #BEE6CE;border-radius:12px;font-size:13.5px;font-weight:600;color:var(--green);cursor:pointer}
.teambanner .tb-ic{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.teambanner .tb-ar{margin-left:auto;font-size:17px;color:var(--green)}
.hi .cc{display:inline-flex;align-items:center;gap:4px;opacity:.9;font-size:12px;font-weight:700}
.hi.sent{background:var(--green)}
.act2{color:var(--tx2);font-size:13px;font-weight:600;padding:9px 8px}
.act2.saved{color:var(--red)}

/* ===== detail page ===== */
.dhero{padding:24px 20px 0;display:flex;align-items:center;gap:15px}
.d-av{width:64px;height:64px;border-radius:18px;font-size:24px}

.d-nm{font-family:var(--head);font-weight:800;font-size:21px;letter-spacing:-.4px}
.goldcoin{width:16px;height:16px;font-size:8px;vertical-align:middle;margin-left:1px}
.p-nm{display:inline-flex;align-items:center;gap:6px}

.balc{margin:20px;border-radius:18px;background:#0D0D0D;color:#fff;padding:20px 22px;display:flex;align-items:center;gap:14px}
.balc .bg{font-family:var(--head);font-weight:900;font-size:26px}
.balc .bl{font-size:12px;color:rgba(255,255,255,.6)}
.packs{padding:10px 20px 0}
.pack{display:flex;align-items:center;gap:14px;border:1px solid var(--br);border-radius:16px;padding:16px;margin-bottom:11px;position:relative}
.pack.best{border-color:var(--tx);border-width:1.5px}
.pack .pack-m{width:44px;height:44px;font-size:17px}
.pack .pmid{flex:1}
.pack .pc{font-family:var(--head);font-weight:800;font-size:18px}
.pack .pd{font-size:12px;color:var(--tx3);margin-top:1px}

.buycoinsbtn{margin:10px 20px 0;width:calc(100% - 40px);background:#fff;border:1.5px solid var(--tx);color:var(--tx);border-radius:12px;padding:13px;font-family:var(--head);font-weight:800;font-size:14px}
.d-mta{font-size:13px;color:var(--tx2);margin-top:3px;font-weight:500}
.dsec{padding:18px 20px 0}
.dk{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);margin-bottom:7px}
.dtxt{font-size:15px;line-height:1.55}
.dtags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.dtag{border:1px solid var(--br2);border-radius:100px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--tx2)}
.dactions{display:flex;gap:10px;padding:22px 20px}
.dhi{flex:1;background:var(--tx);color:#fff;border-radius:12px;padding:14px;font-family:var(--head);font-weight:800;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:8px}
.dhi.sent{background:var(--green)}
.dsave{border:1.5px solid var(--br2);border-radius:12px;padding:14px 18px;font-weight:700;font-size:13.5px;color:var(--tx)}
.dsave.saved{border-color:var(--red);color:var(--red)}
.dposts{border-top:1px solid var(--br);margin-top:6px}

.mstage{position:relative;padding:0 8px;margin-top:2px}

.mstage.stmini .track,.mstage.stmini .fill{top:5px}
.mstage.stmini .pt{gap:7px}

.curtag{font-size:11.5px;font-weight:700;color:var(--red)}

.tm-bd{flex:1}.tm-nm{font-size:14.5px;font-weight:700}

<body>
<div class="phone" id="app"></div>
<div id="toast"></div>
<script>
/* ================== BACKEND (Supabase) ================== */
const CFG = window.YB_CONFIG || {DEMO:true};
const DEMO = CFG.DEMO !== false;   // default: demo/preview mode
let sb = null;
if(!DEMO && window.supabase){ sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY, {auth:{detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'pkce'}}); }

// Avatar color palette (matches DB avatar_color int index)
const AV_COLORS = ['#FF2B2B','#10B981','#6366f1','#EC4899','#F59E0B','#0EA5E9','#8B5CF6','#F97316'];
const ROLE_OPTIONS = ['Founder','Engineer / Developer','Designer','Product','Growth / Marketing','Sales','Operations','Other'];

const YB = {
  demo(){ return DEMO; },
  // ---- AUTH ----
  async signUpEmail(email, pw, stay){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signUp({email, password:pw});
    if(error) return {ok:false, error:error.message};
    return {ok:true, user:data.user};
  },
  async signInEmail(email, pw, stay){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signInWithPassword({email, password:pw});
    if(error) return {ok:false, error:error.message};
    return {ok:true, user:data.user};
  },
  async signInOAuth(provider){
    if(DEMO) return {ok:true, demo:true};
    const {data,error} = await sb.auth.signInWithOAuth({provider, options:{redirectTo:location.origin}});
    if(error) return {ok:false, error:error.message};
    return {ok:true};
  },
  async signOut(){
    if(DEMO) return {ok:true};
    await sb.auth.signOut();
    return {ok:true};
  },
  async currentUser(){
    if(DEMO) return null;
    const {data} = await sb.auth.getUser();
    return data ? data.user : null;
  },
  onAuth(cb){
    if(DEMO || !sb) return;
    sb.auth.onAuthStateChange((_e,session)=>cb(session ? session.user : null));
  },
  // ---- PROFILE ----
  async myProfile(userId){
    if(DEMO) return null;
    const {data} = await sb.from('profiles').select('*').eq('user_id',userId).maybeSingle();
    return data;
  },
  async saveProfile(userId, p){
    if(DEMO) return {ok:true};
    const row = {
      user_id:userId, name:p.n, role:p.role, city:p.loc, one_liner:p.bio,
      skills:p.goodat||[], onboarded:true, avatar_color:p.avatar_color||0
    };
    const {error} = await sb.from('profiles').upsert(row, {onConflict:'user_id'});
    return error ? {ok:false,error:error.message} : {ok:true};
  },
  // ---- FEED (uses existing public_feed RPC) ----
  async feed(){
    if(DEMO) return {people:[],projects:[]};
    try{
      const {data:rows} = await sb.rpc('public_feed');
      const people=[], projects=[];
      (rows||[]).forEach(r=>{
        const mapped = mapRowToEntity(r);
        if(r.kind==='project') projects.push(mapped); else people.push(mapped);
      });
      // projects table (separate) too
      const {data:projRows} = await sb.from('projects').select('*').eq('status','live').order('created_at',{ascending:false}).limit(50);
      (projRows||[]).forEach(p=>projects.push(mapProjectRow(p)));
      return {people, projects};
    }catch(e){ return {people:[],projects:[]}; }
  },
  // fetch a single public profile/project by id (for share deep-links not in the feed)
  async entityById(id){
    if(DEMO) return null;
    try{ const {data:prof} = await sb.rpc('public_profile',{target:id}); if(prof) return {kind:'person', entity:mapRowToEntity(prof)}; }catch(e){}
    try{ const {data:proj} = await sb.from('projects').select('*').eq('id',id).eq('status','live').maybeSingle(); if(proj) return {kind:'project', entity:mapProjectRow(proj)}; }catch(e){}
    return null;
  },
  // ---- CREDITS (uses my_coins RPC) ----
  async myCoins(){
    if(DEMO) return 50;
    try{ const {data} = await sb.rpc('my_coins'); return (data && (data.balance!=null?data.balance:data)) || 0; }
    catch(e){ return 0; }
  },
  async credits(profileId){ return this.myCoins(); },
  async claimDaily(){
    if(DEMO) return {ok:true, balance:null};
    try{ const {data,error}=await sb.rpc('claim_daily'); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  async grantReward(kind){
    if(DEMO) return {ok:true, balance:null};
    try{ const {data,error}=await sb.rpc('grant_reward',{kind}); if(error) return {ok:false,error:error.message}; return {ok:!data.error, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  async myRewards(){
    if(DEMO) return [];
    try{ const {data}=await sb.rpc('my_rewards'); return data||[]; }
    catch(e){ return []; }
  },
  async myMemberships(){
    if(DEMO) return {team:[],applied:[]};
    try{ const {data}=await sb.rpc('my_memberships'); return data||{team:[],applied:[]}; }
    catch(e){ return {team:[],applied:[]}; }
  },
  // ---- CONNECT (uses do_connect RPC — handles credit spend + thread) ----
  async connect(targetPid, note){
    if(DEMO) return {ok:true};
    try{ const {data,error}=await sb.rpc('do_connect',{target:targetPid, note:note||null}); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- SAVE PROFILE (uses save_profile RPC) ----
  async saveProfileRPC(p){
    if(DEMO) return {ok:true};
    try{ const {data,error}=await sb.rpc('save_profile',{p}); if(error) return {ok:false,error:error.message}; return {ok:true, ...(data||{})}; }
    catch(e){ return {ok:false,error:String(e)}; }
  },
  // ---- CAMPFIRE ----
  async campfire(){
    if(DEMO) return [];
    const today=new Date().toISOString().slice(0,10);
    const {data} = await sb.from('campfire_answers').select('*').eq('day_key',today).order('created_at',{ascending:false});
    return data||[];
  },
  async postCampfire(profileId, name, body){
    if(DEMO) return {ok:true};
    const {error} = await sb.from('campfire_answers').insert({profile_id:profileId, name, body});
    return error ? {ok:false,error:error.message} : {ok:true};
  },
  // ---- INBOX / THREADS / MESSAGES ----
  async inbox(){
    if(DEMO) return {threads:[], requests:[]};
    try{
      const {data,error}=await sb.rpc('my_inbox');
      if(error) return {threads:[], requests:[], error:true};
      if(!data) return {threads:[], requests:[]};
      // new format: {threads, requests}; tolerate old array format too

function mapRowToEntity(r){

    : (r.seeking?[{id:r.id, ask:`Looking for <span class="h">${esc(r.seeking)}</span>.`, give:_skillsGive, created_at:r.created_at||null}]:[]);
  return {
    id:r.id, type:'person', n:esc(r.name||'Someone'), c:col,
    meta:[r.role, r.city].filter(Boolean).map(esc).join(' · '),

    posts: posts,
    created_at: r.created_at||null,
    pro: !!r.is_premium, photo:r.photo_url||null
  };
}

function isoWeek(d){
  d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}
function campfireQuestion(){
  return CAMPFIRE_QUESTIONS[(isoWeek(new Date())-1)%CAMPFIRE_QUESTIONS.length];

// Render a photo value as CSS: image URL/DataURL -> cover image; otherwise treat as color.
function photoBg(v){
  if(!v) return '';
  if(typeof v==='string' && (v.startsWith('http')||v.startsWith('data:')||v.startsWith('blob:')))
    return `background-image:url('${v.replace(/'/g,"\\'")}');background-size:cover;background-position:center`;
  return `background:${v}`;
}
function hasImg(v){ return typeof v==='string' && (v.startsWith('http')||v.startsWith('data:')||v.startsWith('blob:')); }
// Escape user-controlled text before it goes into innerHTML (XSS protection)
function esc(s){
  if(s==null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  const self=(id==='you_self'||(S.me.pid&&id===S.me.pid));
  const tgt=self?"go('me')":`openDetail('${id}')`;
  const header=bare?'':`<div class="p-top" onclick="${tgt}">${av(e,'p-av')}<div><div class="p-nm">${e.n}${self?' <span class="youtag">You</span>':''}${goldCoin(e)}</div><div class="p-mta">${e.meta}</div></div></div>`;
  const saveShare=`<button class="act2 ${S.saved[id]?'saved':''}" onclick="event.stopPropagation();toggleSave('${id}',this)">${S.saved[id]?'Saved':'Save'}</button><button class="act2" onclick="event.stopPropagation();openShare('${id}')">Share</button>`;
  const selfActs=`<div class="acts"><button class="act2" onclick="event.stopPropagation();editMyPost()">Edit</button><button class="act2" onclick="event.stopPropagation();openShare('${id}')">Share</button></div>`;
  const askClick=bare?'':`onclick="${tgt}"`;
  let posts; if(onlyPostId){ const all=(e.type==='person'&&Array.isArray(e.posts))?e.posts:[]; posts=[all.find(pp=>pp.id===onlyPostId)||{id:id,ask:e.ask,give:e.give}]; } else { posts=(e.type==='person'&&Array.isArray(e.posts)&&e.posts.length)?e.posts:[{id:id,ask:e.ask,give:e.give}]; }
  function acts(pp){ if(noact)return ''; if(self)return `<div class="acts"><button class="act2" onclick="event.stopPropagation();editMyPost('${pp.id}')">Edit</button><button class="act2" onclick="event.stopPropagation();openShare('${id}')">Share</button></div>`; const primary=(e.type==='project')?actionBtn(id):respondBtn(id,pp.id); const ph=noPrimary?'':primary; const ss=(bare&&e.type==='project')?'':saveShare; if(!ph&&!ss)return ''; return `<div class="acts">${ph}${ss}</div>`; }
  let bodyC;
  if(posts.length>1){
    bodyC=`<div class="pcnt">${posts.length} posts</div>`+posts.map(pp=>`<div class="pblock"><div class="p-ask" ${askClick}>${pp.ask}</div>${acts(pp)}</div>`).join('');
  }else{
    const pp=posts[0];
    bodyC=`<div class="p-ask" ${askClick}>${pp.ask}</div><div class="p-give">${pp.give||''}</div>${acts(pp)}`;
  }
  return `<div class="post">${header}${bodyC}</div>`;}
function dirRow(id){const e=E(id);const self=(id==='you_self');return `<div class="row" onclick="${self?"go('me')":`openDetail('${id}')`}">${av(e,'av-r')}<div class="bd2"><div class="nm">${e.n}${self?' <span class="youtag">You</span>':''}${goldCoin(e)}</div><div class="mta">${e.meta}</div></div><span class="chev">›</span></div>`;}

function rHome(){

  S.feed.forEach(id=>{ const e=E(id); if(!e||!inTab(e))return;
    if(e.type==='person'){ const ps=(Array.isArray(e.posts)&&e.posts.length)?e.posts:(e.ask?[{id:id,created_at:e.created_at}]:[]); ps.forEach(pp=>list.push({id,postId:pp.id,ts:pp.created_at,kind:'post'})); }

function rChat(){
  let c=S.chats.find(x=>x.id===S.chatId);
  if(!c){ c={id:S.chatId, threadId:null, msgs:[], accepted:true, pending:false}; S.chats.unshift(c); }
  const e=E(c.id); if(!e){ return `${backbar('Chat','inbox')}<div class="empty" style="text-align:center;color:var(--tx3);padding:60px 40px">Conversation not found.</div>${bnav('inbox')}`; }
  c.unread=false;
  const sys = c.accepted ? (c.isProj?`You joined${c.pick?' as '+c.pick:''}`:`You're connected with ${e.n}`)
            : c.pending ? `Request sent · costs 10 coins`
            : null;
  const msgsHtml=c.msgs.map(m=>{
    const intentTag=m.intent?`<div class="msgintent">${m.intent}</div>`:'';
    return `<div class="msg ${m.me?'me':'them'}">${intentTag}${m.t}</div>`;
  }).join('');
  const body=`<div class="chatbody">
    ${sys?`<div class="sysline"><span>${sys}</span></div>`:''}
    ${msgsHtml}
    ${c.pending?`<div class="pendtag"><span>Waiting for ${e.n} to respond</span></div>`:''}
  </div>`;
  const dock = c.pending
    ? `<div class="dock disabled"><div class="fieldA"><div class="me">${S.me.n[0].toUpperCase()}</div><input disabled placeholder="They need to accept first…"><button class="send"><svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></svg></button></div></div>`
    : `<div class="dock"><div class="fieldA"><div class="me">${S.me.n[0].toUpperCase()}</div><input id="chatinput" placeholder="Message ${e.n}…" onkeydown="if(event.key==='Enter')sendMsg()"><button class="send" onclick="sendMsg()"><svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="14 6 20 12 14 18"/></svg></button></div></div>`;
  const openProfile = e.type==='project'?`openDetail('${c.id}')`:`openDetail('${c.id}')`;
  const header=`<div class="backbar"><button class="backbtn" onclick="back('inbox')">‹</button><div class="chattl" onclick="${openProfile}">${av(e,'chatav'+(e.type==='project'?' sq':''))}<span class="backttl">${e.n}</span></div></div>`;
  return `${header}${body}${dock}${bnav('inbox')}`;}

function myRole(id){
  // owner if it's my project, member if I'm on the team or accepted a join, else guest
  if(S.myprojects&&S.myprojects[id])return 'owner';
  if(S.myproject&&S.myproject.id===id)return 'owner';
  const c=S.chats.find(x=>x.id===id);
  if((c&&c.accepted&&c.isProj)||S.memberOf[id])return 'member';
  return 'guest';
}

  if(role==='owner'){const ac=((S.applicantsData&&S.applicantsData[id])||[]).filter(a=>!a.is_team).length; tabs.push(['applicants','Applicants',ac||null]);}
  tabs.push(['chat','Chat',null,isGuest]);
  const tabsHtml=tabs.map(t=>{
    const cnt=(typeof t[2]==='number')?`<span class="tcnt">${t[2]}</span>`:'';

function renderSearchResults(){
  const q=(S.searchQ||'').toLowerCase().trim();
  // LIVE: server-side search (debounced)
  if(!YB.demo()){
    if(!q){ const el0=document.getElementById('searchResults'); if(el0)el0.innerHTML=searchResultsHtml('',[]); return; }
    clearTimeout(window._searchT);
    window._searchT=setTimeout(async ()=>{
      const cur=(S.searchQ||'').toLowerCase().trim();
      if(!cur)return;
      const ents=await YB.searchProfiles(cur);
      // stash results so dirRow/E can find them
      (ents||[]).forEach(e=>{ S.people[e.id]=S.people[e.id]||e; });
      const ids=(ents||[]).map(e=>e.id);
      const el=document.getElementById('searchResults');
      if(el && (S.searchQ||'').toLowerCase().trim()===cur) el.innerHTML=searchResultsHtml(cur,ids);
    },250);
    // show a light loading state immediately
    const el=document.getElementById('searchResults');
    if(el)el.innerHTML=`<div class="empty" style="text-align:center;color:var(--tx3);font-size:13.5px;padding:40px">Searching…</div>`;
    return;
  }
  // DEMO: local search over loaded entities
  const all=Object.keys(S.people).concat(Object.keys(S.projects)).filter(id=>id!=='you_self'&&id!=='myproj');
  const results=q?all.filter(id=>{const e=E(id);if(!e)return false;
    const hay=[e.n,e.meta,e.about,(e.brings||[]).join(' '),(e.roles||[]).map(r=>r.t).join(' ')].join(' ').toLowerCase();
    return hay.includes(q);}):[];
  const el=document.getElementById('searchResults');if(el)el.innerHTML=searchResultsHtml(q,results);
}

async function obAuth(){
  const emailEl=document.getElementById('ob_email');
  const pwEl=document.getElementById('ob_pw');
  const email=emailEl?emailEl.value.trim():'';
  const pw=pwEl?pwEl.value:'';

  // ---- DEMO / Preview: klickbar ohne echtes Login ----
  if(YB.demo()){
    if(OB.mode==='login'){
      S.me.n=S.me.n||'Yuen';S.me.role=S.me.role||'Founder';S.me.loc=S.me.loc||'Munich';
      S.me.pid=S.me.pid||'demo-me'; S.guest=false;
      toast('Welcome back');S.onboarding=false;S.view=null;S.stack=[];render();
    } else {
      obGo('role');
    }
    return;
  }

  // ---- LIVE: echtes Supabase-Auth ----
  if(!email||!pw){toast('Enter your email and password');return;}
  toast(OB.mode==='login'?'Logging in…':'Creating account…');
  const res = OB.mode==='login'
    ? await YB.signInEmail(email,pw,OB.stay)
    : await YB.signUpEmail(email,pw,OB.stay);
  if(!res.ok){ toast(res.error||'Auth failed'); return; }

  const user = res.user || await YB.currentUser();
  if(!user){ toast('Check your email to confirm your account.'); return; }

  const prof = await YB.myProfile(user.id);
  if(prof){ mapProfileToMe(prof); S.coins = await YB.myCoins(); }

  if(prof && prof.onboarded){
    S.onboarding=false;S.view=null;S.stack=[];toast('Welcome back');render();loadFeed();
  } else if(OB.mode==='login'){
    S.onboarding=false;S.view=null;S.stack=[];render();loadFeed();
  } else {
    obGo('role');
  }
}

async function obFinish(applyProfile){

  }
  // persist to DB via save_profile RPC (live only)
  if(!YB.demo()){
    try{
      const user=await YB.currentUser();
      // was this profile already onboarded before? (to send welcome only once)
      let wasOnboarded=false;
      if(user){ const pre=await YB.myProfile(user.id); wasOnboarded=!!(pre&&pre.onboarded); }
      await YB.saveProfileRPC({
        name:S.me.n, role:S.me.role, one_liner:S.me.bio||'',
        skills:S.me.goodat||[], city:S.me.loc||'', kind:'person', onboarded:true
      });

      // completing onboarding IS completing your profile -> grant the +50 automatically
      try{

      }catch(e){}

// Resize an image file so its longest side <= maxPx, re-encode as JPEG.
function compressImage(file, maxPx, quality){
  return new Promise((resolve,reject)=>{
    if(!file.type || !file.type.startsWith('image/')) return resolve(file);
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      let {width:w, height:h}=img;
      if(w<=maxPx && h<=maxPx){ URL.revokeObjectURL(url); return resolve(file); } // already small
      if(w>h){ h=Math.round(h*maxPx/w); w=maxPx; } else { w=Math.round(w*maxPx/h); h=maxPx; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cv.toBlob(blob=>{
        if(!blob) return resolve(file);
        const name=(file.name||'photo').replace(/\.[^.]+$/,'')+'.jpg';
        resolve(new File([blob], name, {type:'image/jpeg'}));
      }, 'image/jpeg', quality||0.85);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('decode failed')); };
    img.src=url;
  });
}

async function claimEarn(key,amt){
  if(S.earned[key])return toast('Already claimed');

    if(S._claiming&&S._claiming[key])return; S._claiming=S._claiming||{}; S._claiming[key]=true;
    const r=await YB.grantReward(key);
    S._claiming[key]=false;
    if(r.ok&&r.balance!=null){ S.earned[key]=true; S.coins=r.balance; toast(`+${r.reward||amt} coins earned`); }
    else if(r.error==='already_claimed'){ S.earned[key]=true; if(r.balance!=null)S.coins=r.balance; toast('Already claimed'); }

// Load real inbox (threads + requests) from Supabase into S (live only)
async function loadInbox(){
  if(YB.demo()) return;
  S.inboxError=false; S.inboxLoading=true;
  if(S.view==='inbox' && !(S.chats&&S.chats.length)) render();
  let data=null;
  try{ data = await YB.inbox(); }
  catch(e){ try{ data = await YB.inbox(); }catch(e2){ data=null; } } // one retry
  S.inboxLoading=false;
  if(!data || data.error){ S.inboxError=true; render(); return; }
  try{
    const user = await YB.currentUser();
    const {threads, requests:reqRows} = data;
    const chats=[];
    (threads||[]).forEach(r=>{
      const oid = r.other_pid || r.other_user;
      const col = AV_COLORS[(r.other_color||0) % AV_COLORS.length];
      S.people[oid] = S.people[oid] || {
        id:oid, type:'person', n:esc(r.other_name||'Someone'), c:col,
        meta:[r.other_role, r.other_city].filter(Boolean).map(esc).join(' · '),
        about:'', brings:[], ask:'', give:'', pro:!!r.other_premium, photo:r.other_photo||null
      };
      const lastFromMe = user && r.last_sender===user.id;
      chats.push({
        id:oid, threadId:r.thread_id,
        msgs:[{me:lastFromMe?1:0, t:esc(r.last_body||'')}],
        time:relTime(r.last_at||r.last_at_msg),
        unread:(r.unread||0)>0,
        accepted:true, pending:false
      });
    });
    // explicit incoming requests from the connects table
    const requests=[];
    (reqRows||[]).forEach(r=>{
      const oid = r.from_pid;
      const col = AV_COLORS[(r.from_color||0) % AV_COLORS.length];
      S.people[oid] = S.people[oid] || {
        id:oid, type:'person', n:esc(r.from_name||'Someone'), c:col,
        meta:[r.from_role, r.from_city].filter(Boolean).map(esc).join(' · '),
        about:'', brings:[], ask:'', give:'', pro:!!r.from_premium, photo:r.from_photo||null
      };
      requests.push({id:oid, threadId:r.thread_id, note:esc(r.note||''), intent:'wants to connect',
        applicationId:r.application_id||null, projId:r.project_id||null, projName:esc(r.project_name||'')||null, appRole:esc(r.application_role||'')||null});
    });
    S.chats = chats;
    S.requests = requests;
    S.inboxError=false;
    // if there are pending requests and we're on the inbox, surface them first
    if(requests.length && S.view==='inbox' && !S._inboxTouched){ S.inboxTab='reqs'; }
    render();
  }catch(e){ S.inboxError=true; render(); }
}
// small relative-time helper
function relTime(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60)return 'now'; if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h'; if(s<604800)return Math.floor(s/86400)+'d';
  return d.toLocaleDateString();
}

  if(prof && prof.onboarded){
    // returning, complete user -> straight into the app
    S.onboarding=false; S.view=null; S.stack=[]; render(); loadFeed();
  } else {
    // new user (e.g. first Google sign-in) -> finish profile setup
    S.onboarding=true; OB.mode='signup'; OB.step='role';
    if(user.email && !OB.email) OB.email=user.email;
    render();
  }
  return true;
}

async function openPendingShare(){
  if(!S.pendingShare) return;
  const id=S.pendingShare;
  let e=E(id);
  if(!(e && e.type)){
    try{
      const r=await YB.entityById(id);
      if(r && r.entity){
        if(r.kind==='project'){ S.projects=S.projects||{}; S.projects[r.entity.id]=r.entity; S.projWork=S.projWork||{}; S.projWork[r.entity.id]=r.entity.work_tags||[]; S.links=S.links||{}; S.links[r.entity.id]=r.entity.links||[]; }
        else { S.people=S.people||{}; S.people[r.entity.id]=r.entity; }
        e=E(id);
      }
    }catch(_){}
  }
  if(e && e.type){
    S.pendingShare=null;
    S.detailId=id; S.stack=['home']; S.tab='home'; S.view='detail';

    render();
  }
}
async function boot(){
  try{ const _p=new URLSearchParams(location.search).get('p'); if(_p) S.pendingShare=_p; }catch(e){}
  // Live: check for an existing session (this IS "stay logged in" — Supabase persists it)
  if(!YB.demo()){
    // If we just came back from an OAuth redirect, the URL carries the session.
    const hasCode = /[?&]code=/.test(location.search);
    const hasToken = /[#&]access_token=/.test(location.hash);
    const hasErr = /[#?&]error=/.test(location.hash+location.search);
    const cameFromOAuth = hasCode || hasToken;

    if(hasErr){
      // surface Google/Supabase errors instead of silently returning to login
      try{
        const p=new URLSearchParams((location.hash||location.search).replace(/^[#?]/,''));
        const msg=p.get('error_description')||p.get('error')||'Login failed';
        setTimeout(()=>toast(decodeURIComponent(msg.replace(/\+/g,' '))),300);
      }catch(e){}
    }

    try{
      // PKCE flow returns ?code=... which must be exchanged for a session
      if(hasCode && sb.auth.exchangeCodeForSession){
        try{ await sb.auth.exchangeCodeForSession(location.href); }catch(e){ console.warn('exchange failed',e); }
      }
      let user = await YB.currentUser();
      // session from URL can take a beat — retry briefly after a redirect
      if(!user && cameFromOAuth){
        for(let i=0;i<12 && !user;i++){ await new Promise(r=>setTimeout(r,300)); user=await YB.currentUser(); }
      }
      if(user){ await routeSignedInUser(user); }
    }catch(e){ console.warn('boot auth error',e); }

    // clean the OAuth params out of the address bar
    if(cameFromOAuth && history.replaceState){
      try{ history.replaceState({}, document.title, location.origin+location.pathname); }catch(e){}
    }
    // react to any later auth change (covers slow redirects)
    YB.onAuth(async (user)=>{
      if(!user) return;
      if(S.onboarding){ await routeSignedInUser(user); return; }
      // session arrived after we'd already rendered the app — make sure data is loaded
      if(!isSignedIn() || !S._feedLoaded){ await routeSignedInUser(user); }
    });
  }
  if(YB.demo()){ try{ seedDemo(); }catch(e){} }
  render();
  if(YB.demo()) openPendingShare();
  // guests (no session) still see the live feed straight away
  if(!isSignedIn()){ try{ loadFeed(); }catch(e){} }
}
boot();
