<style>

/* network v2 */

/* -- 2. REAL COINS: balance/streak from server -- */
async function loadCoins(){
  if(!sb) return;
  var _u=await _uid(); if(!_u) return;
  try{
    var r=await sb.rpc('my_coins');
    if(r.data&&!r.data.error){ state.coins=r.data.balance||0; state.streak=r.data.streak||0; state._coinsLoaded=true;
      if(r.data.gap===0){ state.lastClaim=todayKey(); } else if(r.data.gap===1){ state.lastClaim=yesterdayKey(); } else { state.lastClaim=null; }
      render(); }
    if(typeof loadMyStats==='function') loadMyStats();
  }catch(e){}

function claimDaily(){
  if(!needAuth(function(){claimDaily();}))return;
  if(!sb){ toast('Connection unavailable'); return; }
  sb.rpc('claim_daily').then(function(r){
    var d=r.data||{};
    if(d.error==='already_claimed'){ toast('Already claimed today \u00b7 come back tomorrow');
      if(typeof d.balance==='number'){state.coins=d.balance;state._coinsLoaded=true;}
      if(typeof d.streak==='number'){state.streak=d.streak;}
      state.lastClaim=todayKey(); render();
      if(document.getElementById('mask').classList.contains('on')) openWallet();
      return; }
    if(d.error){ toast(d.error==='no_profile'?'Create your profile first':'Could not claim'); if(d.error==='no_profile')openOnboarding(); return; }
    state.coins=d.balance; state.streak=d.streak; state._coinsLoaded=true; state.lastClaim=todayKey(); if(document.getElementById('mask').classList.contains('on')){ render(); openWallet(); }
    toast('Claimed +'+d.reward+' coins \u00b7 day '+d.streak); render();
  }).catch(function(){ toast('Could not claim'); });
}

/* -- 3. REAL CONNECT: do_connect RPC (charges 10 coins, opens thread) -- */
function sendConnect(id,intent){
  var p=person(id); if(!p) return;
  if(!p._dbid){ toast('This profile is not connectable'); return; }
  if(!sb){ toast('Connection unavailable'); return; }
  var note=(state._note||'').trim();
  var full=(intent?('['+intent+'] '):'')+(note||('Hey '+p.n.split(' ')[0]+', let\u2019s connect.'));
  sb.rpc('do_connect',{target:p._dbid,note:full}).then(function(r){
    var d=r.data||{};
    if(d.error==='not_enough_coins'){ closeM(); openWallet(); toast('Not enough coins \u00b7 claim your daily first'); return; }
    if(d.error==='no_profile'){ closeM(); openOnboarding(); return; }
    if(d.error){ toast('Could not connect'); return; }
    state._note=''; state._intent=null;
    if(typeof d.balance==='number') state.coins=d.balance;
    closeM(); toast(d.charged?('Sent \u00b7 \u221210 coins'):'Already connected'); go('chat:'+d.thread);
  }).catch(function(){ toast('Could not connect'); });
}

var _chan=null, _chanTid=null;
async function loadMessages(tid){
  if(!sb) return;
  try{
    var r=await sb.from('messages').select('*').eq('thread_id',tid).order('created_at',{ascending:true}).limit(200);

function _subscribeThread(tid){
  if(!sb) return;
  if(_chan&&_chanTid!==tid){ try{ sb.removeChannel(_chan); }catch(e){} _chan=null; }
  if(_chan) return;
  _chanTid=tid;
  _chan=sb.channel('th_'+tid).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'thread_id=eq.'+tid},function(payload){
    state._msgs=state._msgs||{}; var arr=state._msgs[tid]=state._msgs[tid]||[];
    if(!arr.some(function(m){return m.id===payload.new.id;})){ arr.push(payload.new); render();
      var box=document.getElementById('chatScroll'); if(box) box.scrollTop=box.scrollHeight; }
  }).subscribe();
}
function vChat(arg){
  if(!_isUuid(arg)){
    return backbar('Chat')+'<div class="feedempty"><div class="fe-t">Conversation not found</div><div class="fe-s">Open a chat from your inbox.</div><button class="fe-b" onclick="tab(\'activity\')">Go to inbox</button></div>';
  }
  var t=(state._threads||[]).find(function(x){return x.id===arg;});
  if(!t&&!state._thLoaded){ loadThreads(); }
  state._msgs=state._msgs||{};
  if(!state._msgs[arg]){ loadMessages(arg); }
  _subscribeThread(arg);
  var msgs=state._msgs[arg]||[];
  var mine=_myUid;
  var body=msgs.map(function(m){

    return '<div style="display:flex;justify-content:'+(me?'flex-end':'flex-start')+';margin:4px 0">'+

  }).join('')||'<div style="text-align:center;color:var(--tx3);font-size:13px;padding:26px 0">Say hi \u2014 this is the start of your conversation.</div>';

   '<div id="chatScroll" style="padding:12px 16px 90px;overflow-y:auto;max-height:calc(100vh - 150px)">'+body+'</div>'+

     '<input id="chatInput" placeholder="Message\u2026" style="flex:1;padding:12px 14px;border:1px solid var(--line);border-radius:100px;font-size:14.5px;font-family:var(--body);outline:none;background:#fff" onkeydown="if(event.key===\'Enter\')sendMsg(\''+arg+'\')"/>'+

   '</div>';
}

  }catch(e){ state._dbP=state._dbP||[]; state._dbPR=state._dbPR||[]; state._dbSq=state._dbSq||[]; }

}
function homeFeedAll(){
 if(state.homeNav==='squads'){
  const sq=(state._dbSq||[]).map(formingCard);
  if(!sq.length)return `<div class="feedempty"><div class="fe-t">No squads forming yet</div><div class="fe-s">Start one and gather people who want to build the same thing.</div><button class="fe-b" onclick="openComposer()">Start a squad</button></div>`;
  return sq.join('');
 }
 if(!state._feedLoaded){ return `<div class="feedempty"><div class="fe-t">Loading…</div></div>`; }
 const people=(state._dbP||[]);
 const projects=(state._dbPR||[]);
 if(!people.length&&!projects.length){ return `<div class="feedempty"><div class="fe-t">Be the first</div><div class="fe-s">No profiles yet. Create yours and you'll show up here.</div><button class="fe-b" onclick="ctaCreateProfile()">Create your profile</button></div>`; }
 const out=[]; const mx=Math.max(people.length,projects.length);
 for(let i=0;i<mx;i++){ if(people[i])out.push(lookCardPerson(people[i])); if(projects[i])out.push(lookCardProj(projects[i])); }
 return out.join('');

function publish(){
  if(!needAuth(publish))return;
  var el=document.getElementById('compnote');
  var note=(el&&el.value.trim())||'';
  if(!sb){ toast('Connection unavailable'); return; }
  if(comp.mode==='forming'){
    var nm=((document.getElementById('sqname')||{}).value||comp.sqn||'').trim();
    if(!nm){ toast('Give your squad a name'); return; }
    var one=note||'Starting from zero \u2014 join if you want to build this.';
    var spots=comp.spots||3; var skills=comp.need.slice();
    _myPid().then(function(pid){
      if(!pid){ openOnboarding(); return; }
      sb.from('projects').insert({ owner_profile_id:pid, owner_name:ME.n, owner_email:ME.email||null,
        name:nm, tagline:one, looking_for:skills.join(', '), deal:String(spots),
        category:'squad', stage:'Forming', role_key:'v4', status:'live', moderation:'approved', city:ME.city||null
      }).then(function(r){
        if(r.error){ toast('Could not post'); return; }
        stack=['home']; state.homeNav='squads'; if(typeof closeFab==='function')closeFab();
        toast('Squad posted'); loadFeed(); scrollTop();
      });
    });
    return;
  }
  if(comp.as==='me'){
    var role='a '+(comp.role||'co-founder').toLowerCase();
    var upd={ seeking:role };
    if(note) upd.one_liner=note;
    if(comp.brings) upd.offering=comp.brings;
    _uid().then(function(u){
      if(!u){ openSignup(); return; }
      sb.from('profiles').update(upd).eq('user_id',u).then(function(r){
        if(r.error){ toast('Could not post'); return; }
        ME.look=role; if(note)ME.one=note; if(comp.brings)ME.open=comp.brings;
        stack=['home']; state.homeNav='looking'; if(typeof closeFab==='function')closeFab();
        toast('Posted \u2014 your card is updated'); loadFeed(); scrollTop();
      });
    });
    return;
  }
  /* need: bestehendes eigenes Projekt sucht Rolle */
  var pr=proj(comp.as);
  if(pr&&pr._dbid){
    sb.from('projects').update({ looking_for:(comp.role||''), what_get:(comp.off||pr.offer) }).eq('id',pr._dbid).then(function(r){
      if(r.error){ toast('Could not post'); return; }
      stack=['home']; if(typeof closeFab==='function')closeFab();
      toast('Posted'); loadFeed(); scrollTop();
    });
  } else { toast('Create the project first'); }
}
/* postProject(): neues Projekt -> DB */
function postProject(){
  if(typeof capC==='function')capC();
  var d=state.draft;
  if(!d.name||!d.name.trim()){ toast('Give it a name first'); return; }
  if(!d.what||!d.what.trim()){ toast('Add one line about it'); return; }
  if(!needAuth(postProject))return;
  var logoUrl=(d.logo&&/^https?:/.test(d.logo))?d.logo:null;
  var fields={ name:d.name.trim(), tagline:(d.what||'').trim(), category:d.ind||'Startup', stage:d.stage||'Idea',
    looking_for:d.looking?(((d.roles&&d.roles.length)?d.roles.join(' \u00b7 '):(d.role||'')).trim()):'', what_get:(d.off||'Equity').trim(),
    commitment:(d.commit||'Flexible').trim(), city:(d.where||'Remote').trim() };
  if(logoUrl) fields.logo_url=logoUrl;

  /* EDIT: bestehendes Projekt aktualisieren statt neu anlegen */
  if(state.editingId){
    var pr=proj(state.editingId);
    if(pr&&pr._dbid){
      if(!sb){ toast('Connection unavailable'); return; }
      sb.from('projects').update(fields).eq('id',pr._dbid).then(function(r){
        if(r.error){ toast('Could not save'); return; }
        pr.n=fields.name; pr.i=fields.name.charAt(0).toUpperCase(); pr.one=fields.tagline;
        pr.ind=fields.category; pr.stage=fields.stage; pr.look=(fields.looking_for||'').toLowerCase();
        pr.offer=fields.what_get; pr.commit=fields.commitment; pr.where=fields.city;
        if(logoUrl) pr.logo=logoUrl;
        var eid=state.editingId; state.editingId=null; state.draft={stage:'Idea',looking:true,ind:''};
        toast('Saved'); stack=['you','project:'+eid]; render(); scrollTop(); loadFeed();
      });
      return;
    }
    /* lokales (nicht-DB) Projekt: in place */
    if(pr){ pr.n=fields.name; pr.i=fields.name.charAt(0).toUpperCase(); if(d.logo)pr.logo=d.logo;
      pr.ind=fields.category; pr.stage=fields.stage; pr.look=(fields.looking_for||'').toLowerCase();
      pr.one=fields.tagline; pr.offer=fields.what_get; pr.commit=fields.commitment; pr.where=fields.city; }
    var eid2=state.editingId; state.editingId=null; state.draft={stage:'Idea',looking:true,ind:''};
    toast('Saved'); stack=['you','project:'+eid2]; render(); scrollTop();
    return;
  }

  /* CREATE */
  if(!sb){ toast('Connection unavailable'); return; }
  _myPid().then(function(pid){
    if(!pid){ openOnboarding(); return; }
    var ins=Object.assign({ owner_profile_id:pid, owner_name:ME.n, owner_email:ME.email||null,
      role_key:'v4', status:'live', moderation:'approved', interest_count:1 }, fields);
    sb.from('projects').insert(ins).then(function(r){
      if(r.error){ toast('Could not create'); return; }
      state.draft={stage:'Idea',looking:true,ind:''};
      stack=['home']; state.homeNav='looking';
      toast(fields.name+' is live'); loadFeed(); scrollTop();
    });
  });
}
/* I'm in (Projekt) & Join (Squad) -> Connect zum Owner, oeffnet Chat */
function _connectOwner(ownerPid, noteTxt, cb){
  if(!sb){ toast('Connection unavailable'); return; }
  sb.rpc('do_connect',{target:ownerPid,note:noteTxt}).then(function(r){
    var d=r.data||{};
    if(d.error==='not_enough_coins'){ openWallet(); toast('Not enough coins \u00b7 claim your daily first'); return; }
    if(d.error==='no_profile'){ openOnboarding(); return; }
    if(d.error==='cannot_connect_self'){ toast('This is your own post'); return; }
    if(d.error){ toast('Owner not reachable'); return; }
    if(typeof d.balance==='number') state.coins=d.balance;
    toast(d.charged?'Sent \u00b7 \u221210 coins':'Already connected'); go('chat:'+d.thread);
    if(cb)cb();
  }).catch(function(){ toast('Could not connect'); });
}
function applyProject(id){
  var p=proj(id); if(!p)return;

async function saveProfile(){
  var msg=document.getElementById('onbMsg');
  var g=function(id){var e=document.getElementById(id);return e?(e.value||'').trim():'';};
  var name=g('onb_name'), one=g('onb_one');
  if(name.length<2){ if(msg)msg.textContent='Please enter your name.'; return; }
  if(one.length<4){ if(msg)msg.textContent='Add a short line about you.'; return; }
  if(!sb){ if(msg)msg.textContent='Connection unavailable \u2014 try on the live site.'; return; }
  var skills=g('onb_skills').split(',').map(function(x){return x.trim();}).filter(Boolean);
  if(msg)msg.textContent='Saving\u2026';
  try{
    var ses=await sb.auth.getSession(); var user=ses.data.session&&ses.data.session.user;
    if(!user){ if(msg)msg.textContent='Please sign in again.'; openSignup(); return; }
    var payload={ name:name, kind:_onbKind, role:g('onb_role'), city:g('onb_city'),
      seeking:g('onb_seek'), one_liner:one, skills:skills, offering:g('onb_open'), availability:g('onb_avail') };
    if(ME.photo&&/^https?:/.test(ME.photo)) payload.photo_url=ME.photo;
    var r=await sb.rpc('save_profile',{p:payload});
    var d=r.data||{};
    if(r.error){ if(msg)msg.textContent='Could not save \u2014 '+r.error.message; return; }
    if(d.error==='email_taken'){ if(msg)msg.textContent='This email is already linked to another account. Log out and sign in with that account.'; return; }
    if(d.error){ if(msg)msg.textContent='Could not save ('+d.error+').'; return; }
    var pr=d.profile||{};
    ME.n=pr.name||name; ME.i=((ME.n||'?')[0]||'?').toUpperCase(); ME.kind=pr.kind||_onbKind;
    ME.role=pr.role||''; ME.city=pr.city||''; ME.look=pr.seeking||''; ME.one=pr.one_liner||'';
    ME.good=Array.isArray(pr.skills)?pr.skills:skills; ME.open=pr.offering||''; ME.avail=pr.availability||'';
    if(pr.photo_url)ME.photo=pr.photo_url;
    ME.email=user.email;
    var first=!state._onboarded;
    state._onboarded=true; state.signedUp=true; window._cardDraft=null;
    toast(first?'You\u2019re in the feed':'Card saved');
    if(cur()==='cardedit'){ stack.pop(); }
    go('you'); if(typeof loadFeed==='function') loadFeed(); if(typeof loadCoins==='function') loadCoins();
  }catch(e){ if(msg)msg.textContent='Could not save \u2014 '+String((e&&e.message)||e); }
}
