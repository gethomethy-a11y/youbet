<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>youbet — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{--red:#FF2B2B;--rd2:#C41616;--grad:linear-gradient(120deg,#FF2B2B 0%,#FF4D4D 55%,#FF6B6B 100%);--bg:#FFFDFC;--ink:#0B0B0F;--tx2:#6B6B72;--br:#E9E9EC;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .wrap{width:100%;max-width:380px;}
  /* Logo */
  .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:40px;}
  .logo-ic{width:42px;height:42px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-ic svg{width:100%;height:100%;}
  .logo-wm{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.04em;color:var(--ink);}
  .logo-wm b{color:var(--red);}
  /* Card */
  .card{background:#fff;border:1px solid var(--br);border-radius:24px;padding:32px 28px;box-shadow:0 4px 24px rgba(11,11,15,.07);}
  h1{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.03em;color:var(--ink);margin-bottom:6px;}
  .sub{font-size:14px;color:var(--tx2);margin-bottom:28px;line-height:1.5;}
  /* Fields */
  .field{margin-bottom:16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
  input{width:100%;background:#fff;border:1.5px solid var(--br);border-radius:12px;padding:14px 16px;font-size:16px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;transition:border-color .18s;-webkit-appearance:none;}
  input::placeholder{color:#C5C5CC;}
  input:focus{border-color:var(--red);}
  .forgot{display:block;font-size:13px;color:var(--tx2);text-decoration:none;margin-top:8px;text-align:right;}
  .forgot:hover{color:var(--red);}
  /* Button */
  .btn{width:100%;margin-top:8px;padding:16px;background:var(--grad);border:none;border-radius:14px;font-family:'Inter Tight',sans-serif;font-weight:800;font-size:16px;color:#fff;cursor:pointer;letter-spacing:-.01em;transition:opacity .2s;-webkit-appearance:none;}
  .btn:hover{opacity:.9;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  /* Messages */
  .msg{border-radius:10px;padding:12px 14px;font-size:14px;margin-top:14px;display:none;line-height:1.5;}
  .msg.err{background:#FFF1EF;border:1px solid rgba(255,43,43,.25);color:var(--rd2);}
  .msg.ok{background:#F0FAF3;border:1px solid rgba(52,168,83,.25);color:#1a7a3c;}
  /* Bottom */
  .divider{display:flex;align-items:center;gap:10px;margin:22px 0;}
  .divider hr{flex:1;border:none;border-top:1px solid var(--br);}
  .divider span{font-size:13px;color:#C5C5CC;}
  .toggle{text-align:center;font-size:14px;color:var(--tx2);}
  .toggle a{color:var(--red);text-decoration:none;font-weight:600;}
  .back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--tx2);text-decoration:none;}
  .back:hover{color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-ic">
      <svg viewBox="0 0 100 100"><circle cx="62" cy="34" r="13" fill="#fff" opacity=".55"/><path d="M40 74c0-12 10-20 22-20s22 8 22 20z" fill="#fff" opacity=".55"/><circle cx="40" cy="40" r="15" fill="#fff"/><path d="M14 82c0-14 12-23 26-23s26 9 26 23z" fill="#fff"/></svg>
    </div>
    <div class="logo-wm">you<b>b</b>et</div>
  </div>
  <div class="card">
    <h1>Welcome back.</h1>
    <p class="sub">Log in to see your matches and projects.</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
      <a href="#" class="forgot" id="forgotBtn">Forgot password?</a>
    </div>
    <button class="btn" id="loginBtn">Log in →</button>
    <div class="msg err" id="errBox"></div>
    <div class="msg ok"  id="okBox"></div>
    <div class="divider"><hr><span>or</span><hr></div>
    <div class="toggle">No account? <a href="/signup.html">Sign up free →</a></div>
  </div>
  <a href="/index.html" class="back">← Back to youbet</a>
</div>
<script>
(function(){
  const URL='https://kqbylqtsyplhdfdhplal.supabase.co';
  const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxYnlscXRzeXBsaGRmZGhwbGFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODYyNjcsImV4cCI6MjA5NTc2MjI2N30.MNC5ZZAbsjeXyEpKJAtZ-RAxesBciG2uMgAsFQ7JCDk';
  let sb;
  try{ sb=supabase.createClient(URL,KEY); }catch(e){ console.warn('Supabase not loaded — deploy to Vercel to test auth.'); }

  if(sb) sb.auth.getSession().then(({data:{session}})=>{ if(session) location.href='/index.html'; });

  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errBox');
  const ok=document.getElementById('okBox');
  function showErr(m){err.textContent=m;err.style.display='block';ok.style.display='none';}
  function showOk(m){ok.innerHTML=m;ok.style.display='block';err.style.display='none';}
  function clear(){err.style.display='none';ok.style.display='none';}

  btn.addEventListener('click',async()=>{
    clear();
    if(!sb){showErr('Auth only works on the live site (Vercel). Open youbet.network to log in.');return;}
    const email=document.getElementById('email').value.trim();
    const pw=document.getElementById('pw').value;
    if(!email||!pw){showErr('Please enter your email and password.');return;}
    btn.disabled=true;btn.textContent='Logging in...';
    const{error}=await sb.auth.signInWithPassword({email,password:pw});
    btn.disabled=false;btn.textContent='Log in →';
    if(error)showErr(error.message);
    else location.href='/index.html';
  });

  document.getElementById('forgotBtn').addEventListener('click',async(e)=>{
    e.preventDefault();clear();
    if(!sb){showErr('Open the live site to use this feature.');return;}
    const email=document.getElementById('email').value.trim();
    if(!email){showErr('Enter your email first.');return;}
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/login.html'});
    if(error)showErr(error.message);
    else showOk('Reset link sent — check your email.');
  });

  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')btn.click();});
  document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pw').focus();});
})();
</script>
</body>
</html>
